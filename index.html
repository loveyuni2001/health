<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全家人健康智慧導航站</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-color: #F5F4F0; --primary-black: #111111; --card-bg: #FFFFFF; --danger: #D93025; --success-green: #188038; --light-blue: #E8F0FE; --light-yellow: #FDF7E7; }
        body { background-color: var(--bg-color); font-family: 'Inter', 'Noto Sans TC', sans-serif; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .portal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary-black); padding-bottom: 12px; }
        .btn-sync-cloud { background: var(--success-green); color: white; padding: 10px 20px; border-radius: 30px; cursor: pointer; border: 2px solid var(--primary-black); font-weight: 700; }
        
        /* 恢復原本的雙欄佈局 */
        .double-entry-wrapper { display: grid; grid-template-columns: 1fr 1.3fr; gap: 20px; margin-bottom: 25px; }
        .entry-card { background: var(--card-bg); border: 2px solid var(--primary-black); border-radius: 16px; padding: 20px; }
        .ai-textarea { width: 100%; border: 2px solid var(--primary-black); border-radius: 12px; padding: 10px; height: 150px; }
        .right-form-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .form-control { border: 2px solid var(--primary-black); padding: 8px; border-radius: 12px; width: 100%; }
        
        /* 恢復表格樣式 */
        .table-card { background: #FFFFFF; border: 2px solid var(--primary-black); border-radius: 16px; overflow: hidden; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; min-width: 1200px; border-collapse: collapse; text-align: center; }
        th, td { padding: 12px; border: 1px solid #ddd; }
        .morning-col { background: var(--light-blue); }
        .evening-col { background: var(--light-yellow); }
        .editable-cell { border: none; background: transparent; text-align: center; width: 100%; font-weight: 700; }
    </style>
</head>
<body>

<div class="container">
    <div class="portal-header">
        <h1>全家人健康智慧導航站</h1>
        <button class="btn-sync-cloud" onclick="syncWithGoogleSheet()"><i class="fa-solid fa-cloud-arrow-up"></i> 同步至 Google Sheet</button>
    </div>

    <div class="double-entry-wrapper">
        <div class="entry-card">
            <label>AI 文字解析</label>
            <textarea id="aiInput" class="ai-textarea" placeholder="在此貼上 LINE 文字..."></textarea>
        </div>
        <div class="entry-card">
            <div class="right-form-grid">
                <input type="date" id="targetDate" class="form-control">
                <select id="targetUser" class="form-control"><option value="妃">妃</option><option value="爸爸">爸爸</option></select>
                <input type="text" id="manualWeight" class="form-control" placeholder="體重">
                <button class="btn-sync-cloud" onclick="handleDataSubmission()">新增記錄</button>
            </div>
        </div>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>日期</th><th>對象</th>
                        <th class="morning-col">血壓</th><th class="morning-col">脈壓差</th><th class="morning-col">心跳</th>
                        <th class="evening-col">血壓</th><th class="evening-col">脈壓差</th><th class="evening-col">心跳</th>
                        <th>體重</th><th>排便</th><th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let healthData = JSON.parse(localStorage.getItem('family_health_data')) || [];
    
    function calculatePulse(bp) {
        if (!bp || !bp.includes('/')) return "—";
        const p = bp.split('/');
        return parseInt(p[0]) - parseInt(p[1]);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        healthData.forEach((item, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td><td>${item.user}</td>
                <td class="morning-col">${item.mBP || ''}</td><td class="morning-col">${calculatePulse(item.mBP)}</td><td>${item.mHR || ''}</td>
                <td class="evening-col">${item.eBP || ''}</td><td class="evening-col">${calculatePulse(item.eBP)}</td><td>${item.eHR || ''}</td>
                <td>${item.weight || ''}</td><td><input type="checkbox" ${item.poop ? 'checked' : ''} disabled></td>
                <td><button onclick="deleteRow(${index})">刪除</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteRow(i) { healthData.splice(i, 1); localStorage.setItem('family_health_data', JSON.stringify(healthData)); renderTable(); }
    
    // (其他同步邏輯保持不變...)
    renderTable();
</script>
</body>
</html>
