<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全家人健康智慧導航站 - 雲端連動版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --bg-color: #F5F4F0; --primary-black: #111111; --card-bg: #FFFFFF; --danger: #D93025; --success-green: #188038; --light-blue: #E8F0FE; --light-yellow: #FDF7E7; }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-color); margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans TC', sans-serif; color: var(--primary-black); }
        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 15px; }
        .portal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 3px solid var(--primary-black); padding-bottom: 12px; flex-wrap: wrap; gap: 10px; }
        .btn-sync-cloud { background: var(--success-green); color: white; border: 2px solid var(--primary-black); padding: 8px 16px; border-radius: 30px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 8px; box-shadow: 0 3px 0 var(--primary-black); }
        
        /* 核心手機適配 */
        .table-card { background: #FFFFFF; border-radius: 16px; border: 2px solid var(--primary-black); overflow: hidden; margin-bottom: 20px; }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; }
        table { width: 100%; border-collapse: collapse; text-align: center; min-width: 1200px; }
        th, td { padding: 10px 8px; font-size: 14px; border-bottom: 2px solid #EAEAEA; border-right: 2px solid #EAEAEA; }
        th { color: white; background: var(--primary-black); }
        .morning-col { background: var(--light-blue); }
        .evening-col { background: var(--light-yellow); }
        .editable-cell { background: transparent; border: 1px solid transparent; text-align: center; width: 100%; font-weight: 700; }
        .value-warning { color: var(--danger) !important; font-weight: 800 !important; background: rgba(217, 48, 37, 0.12); }
        
        .double-entry-wrapper { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 25px; }
        @media(min-width: 992px) { .double-entry-wrapper { grid-template-columns: 1fr 1.3fr; } }
        .entry-card { background: var(--card-bg); border: 2px solid var(--primary-black); border-radius: 16px; padding: 20px; }
        .ai-textarea { width: 100%; border: 2px solid var(--primary-black); border-radius: 12px; padding: 12px; min-height: 150px; }
        .right-form-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        .form-control { border: 2px solid var(--primary-black); padding: 8px; border-radius: 12px; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="portal-header">
        <h1>全家人健康智慧導航站</h1>
        <button class="btn-sync-cloud" onclick="syncWithGoogleSheet()"><i class="fa-solid fa-cloud-arrow-up"></i> 同步至 Google Sheet</button>
    </div>

    <div class="table-card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th rowspan="2" style="width: 120px;">日期</th><th rowspan="2" style="width: 80px;">對象</th>
                        <th colspan="4" class="morning-col">【早上】紀錄</th><th colspan="4" class="evening-col">【晚上】紀錄</th>
                        <th rowspan="2">體重</th><th rowspan="2">排便</th><th rowspan="2">備註</th><th rowspan="2">操作</th>
                    </tr>
                    <tr>
                        <th class="morning-col">血壓</th><th class="morning-col">脈壓差</th><th class="morning-col">心跳</th><th class="morning-col">血氧</th>
                        <th class="evening-col">血壓</th><th class="evening-col">脈壓差</th><th class="evening-col">心跳</th><th class="evening-col">血氧</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";
    let healthData = JSON.parse(localStorage.getItem('family_health_data')) || [];

    function calculatePulse(bp) {
        if (!bp || !bp.includes('/')) return "—";
        const p = bp.split('/');
        return parseInt(p[0]) - parseInt(p[1]);
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        healthData.forEach((item, index) => {
            const mDiff = calculatePulse(item.mBP);
            const eDiff = calculatePulse(item.eBP);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.date}</td><td>${item.user}</td>
                <td class="morning-col">${item.mBP}</td><td class="morning-col">${mDiff}</td><td>${item.mHR}</td><td>${item.mBO}</td>
                <td class="evening-col">${item.eBP}</td><td class="evening-col">${eDiff}</td><td>${item.eHR}</td><td>${item.eBO}</td>
                <td>${item.weight}</td><td>${item.poop ? '✅' : ''}</td><td>${item.symptom}</td>
                <td><button onclick="deleteRow(${index})">🗑️</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteRow(i) { healthData.splice(i, 1); localStorage.setItem('family_health_data', JSON.stringify(healthData)); renderTable(); }
    
    function syncWithGoogleSheet() {
        fetch(GOOGLE_WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(healthData) })
        .then(() => alert("同步成功！"));
    }

    renderTable();
</script>
</body>
</html>
