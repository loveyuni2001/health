<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全家人健康智慧導航站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg-color:#F5F4F0;
    --primary-black:#111111;
    --card-bg:#FFFFFF;
    --text-sub:#5F6368;
    --danger:#D93025;
    --success-green:#188038;
    --light-blue:#E8F0FE;
    --light-yellow:#FDF7E7;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:var(--bg-color);
    font-family:'Inter','Noto Sans TC',sans-serif;
    color:var(--primary-black);
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:15px;
}

.portal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    border-bottom:3px solid var(--primary-black);
    padding-bottom:12px;
    flex-wrap:wrap;
    gap:10px;
}

.title-group h1{
    margin:0;
    font-size:24px;
}

.title-group p{
    margin:3px 0 0 0;
    font-size:12px;
    color:var(--text-sub);
    font-weight:700;
}

.sync-btn-container{
    display:flex;
    gap:10px;
    align-items:center;
}

.btn-sync-cloud{
    background:var(--success-green);
    color:#fff;
    border:2px solid var(--primary-black);
    border-radius:30px;
    padding:10px 16px;
    cursor:pointer;
    font-weight:700;
    box-shadow:0 3px 0 var(--primary-black);
}

.double-entry-wrapper{
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:20px;
    margin-bottom:25px;
}

@media(max-width:992px){
    .double-entry-wrapper{
        grid-template-columns:1fr;
    }
}

.entry-card{
    background:#fff;
    border:2px solid var(--primary-black);
    border-radius:16px;
    padding:20px;
    position:relative;
}

.step-label{
    position:absolute;
    top:-12px;
    left:20px;
    background:var(--primary-black);
    color:#fff;
    padding:3px 12px;
    border-radius:30px;
    font-size:11px;
    font-weight:700;
}

.box-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:15px;
}

.ai-textarea{
    width:100%;
    min-height:150px;
    border:2px solid var(--primary-black);
    border-radius:12px;
    padding:12px;
    resize:none;
    font-size:14px;
}

.right-form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
}

@media(max-width:576px){

    .right-form-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .mobile-full{
        grid-column:span 2 !important;
    }

}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
}

.form-control{
    width:100%;
    height:42px;
    border:2px solid var(--primary-black);
    border-radius:12px;
    padding:8px 10px;
    font-size:14px;
    font-weight:600;
}

.sub-section-title{
    grid-column:span 6;
    padding:7px;
    border-radius:8px;
    font-weight:700;
    font-size:13px;
}

.title-morning{
    background:var(--light-blue);
    color:#1A73E8;
}

.title-evening{
    background:var(--light-yellow);
    color:#B06000;
}

.poop-switch-container{
    height:42px;
    display:flex;
    align-items:center;
    justify-content:center;
    border:2px solid var(--primary-black);
    border-radius:12px;
}

.btn-ai{
    width:100%;
    background:var(--primary-black);
    color:#fff;
    border:none;
    border-radius:12px;
    padding:13px;
    cursor:pointer;
    font-weight:700;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
    border-top:3px solid var(--primary-black);
    padding-top:15px;
}

.filter-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.select-box-wrapper{
    background:#fff;
    border:2px solid var(--primary-black);
    border-radius:30px;
    padding:5px 12px;
}

.filter-select{
    border:none;
    background:transparent;
    font-weight:700;
}

.table-card{
    background:#fff;
    border:2px solid var(--primary-black);
    border-radius:16px;
    overflow:hidden;
}

.table-responsive{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1200px;
    border-collapse:collapse;
}

th,td{
    border-right:2px solid #EAEAEA;
    border-bottom:2px solid #EAEAEA;
    padding:10px 8px;
    text-align:center;
    font-size:14px;
}

th{
    background:var(--primary-black);
    color:#fff;
}

.morning-col{
    background:var(--light-blue);
}

.evening-col{
    background:var(--light-yellow);
}

.editable-cell{
    width:100%;
    border:2px solid transparent;
    background:transparent;
    border-radius:6px;
    padding:4px;
    text-align:center;
    font-weight:700;
}

.editable-cell:focus{
    border:2px solid var(--primary-black);
    background:#fff;
}

.value-warning{
    color:var(--danger)!important;
    font-weight:800!important;
    background:rgba(217,48,37,.12);
    border-radius:4px;
}

.symptom-input{
    text-align:left;
}

.btn-delete-row{
    border:none;
    background:none;
    cursor:pointer;
}

.tip-text{
    margin-top:15px;
    font-size:12px;
    text-align:center;
    color:var(--text-sub);
    font-weight:700;
}

.loading-spinner{
    display:none;
    color:var(--success-green);
    font-size:13px;
    font-weight:700;
}

</style>
</head>

<body>

<div class="container">

<div class="portal-header">

<div class="title-group">
<h1>全家人健康智慧導航站</h1>
<p>Family Health Intelligence Cloud Portal</p>
</div>

<div class="sync-btn-container">
<span id="loadingTxt" class="loading-spinner">
<i class="fa-solid fa-spinner fa-spin"></i> 雲端同步中...
</span>

<button class="btn-sync-cloud" onclick="syncWithGoogleSheet()">
<i class="fa-solid fa-cloud-arrow-up"></i>
同步至 Google Sheet 備份
</button>
</div>

</div>

<div class="double-entry-wrapper">

<div class="entry-card">

<div class="step-label">01 智慧解析</div>

<div class="box-title">
<i class="fa-solid fa-wand-magic-sparkles"></i>
LINE 文字全解析
</div>

<textarea id="aiInput" class="ai-textarea" placeholder="貼上 LINE 血壓文字"></textarea>

</div>

<div class="entry-card">

<div class="step-label">02 手動紀錄 / 微調區</div>

<div class="box-title">
<i class="fa-solid fa-keyboard"></i>
基礎設定與健康指標填寫
</div>

<div class="right-form-grid">

<div class="input-group mobile-full" style="grid-column:span 2;">
<label>設定日期</label>
<input type="date" id="targetDate" class="form-control">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>記錄對象</label>
<select id="targetUser" class="form-control">
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="input-group" style="grid-column:span 1;">
<label>體重</label>
<input type="text" id="manualWeight" class="form-control" placeholder="57.7">
</div>

<div class="input-group" style="grid-column:span 1;">
<label>排便</label>
<div class="poop-switch-container">
<input type="checkbox" id="manualPoop">
</div>
</div>

<div class="sub-section-title title-morning">
<i class="fa-solid fa-sun"></i>
【早上】指標
</div>

<div class="input-group" style="grid-column:span 2;">
<label>早上血壓</label>
<input type="text" id="morningBP" class="form-control" placeholder="112/79">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>早上心跳</label>
<input type="text" id="morningHR" class="form-control" placeholder="84">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>早上血氧/心跳</label>
<input type="text" id="morningBO" class="form-control" placeholder="97/75">
</div>

<div class="sub-section-title title-evening">
<i class="fa-solid fa-moon"></i>
【晚上】指標
</div>

<div class="input-group" style="grid-column:span 2;">
<label>晚上血壓</label>
<input type="text" id="eveningBP" class="form-control" placeholder="131/76">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>晚上心跳</label>
<input type="text" id="eveningHR" class="form-control" placeholder="99">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>晚上血氧/心跳</label>
<input type="text" id="eveningBO" class="form-control" placeholder="96/95">
</div>

<div class="input-group mobile-full" style="grid-column:span 6;">
<label>症狀與服藥備註</label>
<input type="text" id="manualSymptom" class="form-control" placeholder="特殊狀況備註">
</div>

<div class="mobile-full" style="grid-column:span 6;">
<button class="btn-ai" onclick="handleDataSubmission()">
<i class="fa-solid fa-plus"></i>
確認新增至暫存表
</button>
</div>

</div>
</div>
</div>

<div class="toolbar">

<div style="font-size:16px;font-weight:700;">
<i class="fa-solid fa-table-list"></i>
03 當機紀錄異動台 (本地暫存)
</div>

<div class="filter-container">

<div class="select-box-wrapper">
<label>看成員:</label>
<select id="userFilter" class="filter-select" onchange="renderTable()">
<option value="全部">全部成員</option>
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="select-box-wrapper">
<label>篩選月份:</label>
<select id="monthFilter" class="filter-select" onchange="renderTable()">
<option value="全部">全部月份</option>
<option value="2026/05">2026/05</option>
<option value="2026/06">2026/06</option>
<option value="2026/07">2026/07</option>
</select>
</div>

</div>
</div>

<div class="table-card">
<div class="table-responsive">

<table>

<thead>

<tr>
<th rowspan="2">日期</th>
<th rowspan="2">對象</th>

<th colspan="4">【早上】紀錄</th>
<th colspan="4">【晚上】紀錄</th>

<th rowspan="2">體重</th>
<th rowspan="2">排便</th>
<th rowspan="2">症狀與服藥備註</th>
<th rowspan="2">操作</th>
</tr>

<tr>
<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>
</div>

<div class="tip-text">
<i class="fa-solid fa-circle-info"></i>
資料會存在本地與 Google Sheet
</div>

</div>

<script>

const GOOGLE_WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

document.getElementById('targetDate').valueAsDate = new Date();

let healthData =
JSON.parse(localStorage.getItem('family_health_data')) || [];

function saveDataToLocal(){
    localStorage.setItem(
        'family_health_data',
        JSON.stringify(healthData)
    );
}

function calculatePulseDifference(bp){

    if(!bp || !bp.includes('/')){
        return {
            value:"—",
            className:""
        };
    }

    let parts = bp.split('/');

    let high = parseInt(parts[0]);
    let low = parseInt(parts[1]);

    if(isNaN(high) || isNaN(low)){
        return {
            value:"—",
            className:""
        };
    }

    let diff = high - low;

    return {
        value:diff,
        className:diff > 60 ? "value-warning" : ""
    };
}

function getHeartRateClass(hr){
    return parseInt(hr) > 100 ? "value-warning" : "";
}

function parseLineText(text){

    let result = {
        mBP:"",
        mHR:"",
        mBO:"",
        eBP:"",
        eHR:"",
        eBO:""
    };

    let clean =
        text.replace(/\r/g,"")
            .replace(/　/g," ")
            .trim();

    let lines =
        clean.split("\n")
             .map(v => v.trim())
             .filter(v => v);

    let mode = "";

    lines.forEach(line=>{

        if(line.includes("早")){
            mode = "morning";
            return;
        }

        if(line.includes("晚")){
            mode = "evening";
            return;
        }

        let bpHrMatch =
            line.match(/(\d{2,3})[-\/](\d{2,3})[-\/](\d{2,3})/);

        if(bpHrMatch){

            let bp =
                bpHrMatch[1] + "/" + bpHrMatch[2];

            let hr =
                bpHrMatch[3];

            if(mode === "morning"){
                result.mBP = bp;
                result.mHR = hr;
            }

            if(mode === "evening"){
                result.eBP = bp;
                result.eHR = hr;
            }

            return;
        }

        let boMatch =
            line.match(/(\d{2,3})[-\/](\d{2,3})/);

        if(boMatch){

            let bo =
                boMatch[1] + "/" + boMatch[2];

            if(mode === "morning"){
                result.mBO = bo;
            }

            if(mode === "evening"){
                result.eBO = bo;
            }

        }

    });

    return result;
}

function handleDataSubmission(){

    const text =
        document.getElementById('aiInput').value;

    const parsed =
        parseLineText(text);

    const formattedDate =
        document.getElementById('targetDate')
        .value
        .replace(/-/g,'/');

    const user =
        document.getElementById('targetUser').value;

    let record = {

        date:formattedDate,
        user:user,

        mBP:parsed.mBP || document.getElementById('morningBP').value,
        mHR:parsed.mHR || document.getElementById('morningHR').value,
        mBO:parsed.mBO || document.getElementById('morningBO').value,

        eBP:parsed.eBP || document.getElementById('eveningBP').value,
        eHR:parsed.eHR || document.getElementById('eveningHR').value,
        eBO:parsed.eBO || document.getElementById('eveningBO').value,

        weight:document.getElementById('manualWeight').value,

        poop:document.getElementById('manualPoop').checked,

        symptom:document.getElementById('manualSymptom').value

    };

    let idx =
        healthData.findIndex(
            d =>
            d.date === record.date &&
            d.user === record.user
        );

    if(idx !== -1){
        healthData[idx] = record;
    }else{
        healthData.unshift(record);
    }

    saveDataToLocal();

    renderTable();

    document.getElementById('aiInput').value = "";

}

function syncWithGoogleSheet(){

    const spinner =
        document.getElementById('loadingTxt');

    spinner.style.display = "inline-block";

    fetch(GOOGLE_WEB_APP_URL,{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify(healthData)
    })
    .then(r=>r.text())
    .then(data=>{

        spinner.style.display = "none";

        alert("同步成功");

    })
    .catch(err=>{

        spinner.style.display = "none";

        console.error(err);

        alert("同步失敗");

    });

}

function deleteRow(index){

    if(confirm("確定刪除?")){

        healthData.splice(index,1);

        saveDataToLocal();

        renderTable();

    }

}

function updateField(index,field,value){

    healthData[index][field] = value;

    saveDataToLocal();

    renderTable();

}

function renderTable(){

    const tbody =
        document.getElementById('tableBody');

    tbody.innerHTML = "";

    const userFilter =
        document.getElementById('userFilter').value;

    const monthFilter =
        document.getElementById('monthFilter').value;

    healthData.forEach((item,index)=>{

        if(
            userFilter !== "全部" &&
            item.user !== userFilter
        ){
            return;
        }

        if(
            monthFilter !== "全部" &&
            !item.date.startsWith(monthFilter)
        ){
            return;
        }

        let mPulse =
            calculatePulseDifference(item.mBP);

        let ePulse =
            calculatePulseDifference(item.eBP);

        let tr =
            document.createElement('tr');

        tr.innerHTML = `

<td>
<input type="date"
class="editable-cell"
value="${item.date.replace(/\//g,'-')}"
onchange="updateField(${index},'date',this.value.replace(/-/g,'/'))">
</td>

<td>
<select class="editable-cell"
onchange="updateField(${index},'user',this.value)">
<option value="妃" ${item.user==="妃"?"selected":""}>妃</option>
<option value="爸爸" ${item.user==="爸爸"?"selected":""}>爸爸</option>
<option value="媽媽" ${item.user==="媽媽"?"selected":""}>媽媽</option>
<option value="通" ${item.user==="通"?"selected":""}>通</option>
</select>
</td>

<td class="morning-col">
<input type="text" class="editable-cell"
value="${item.mBP || ''}"
onchange="updateField(${index},'mBP',this.value)">
</td>

<td class="morning-col ${mPulse.className}">
${mPulse.value}
</td>

<td class="morning-col">
<input type="text"
class="editable-cell ${getHeartRateClass(item.mHR)}"
value="${item.mHR || ''}"
onchange="updateField(${index},'mHR',this.value)">
</td>

<td class="morning-col">
<input type="text"
class="editable-cell"
value="${item.mBO || ''}"
onchange="updateField(${index},'mBO',this.value)">
</td>

<td class="evening-col">
<input type="text"
class="editable-cell"
value="${item.eBP || ''}"
onchange="updateField(${index},'eBP',this.value)">
</td>

<td class="evening-col ${ePulse.className}">
${ePulse.value}
</td>

<td class="evening-col">
<input type="text"
class="editable-cell ${getHeartRateClass(item.eHR)}"
value="${item.eHR || ''}"
onchange="updateField(${index},'eHR',this.value)">
</td>

<td class="evening-col">
<input type="text"
class="editable-cell"
value="${item.eBO || ''}"
onchange="updateField(${index},'eBO',this.value)">
</td>

<td>
<input type="text"
class="editable-cell"
value="${item.weight || ''}"
onchange="updateField(${index},'weight',this.value)">
</td>

<td>
<input type="checkbox"
${item.poop ? "checked" : ""}
onchange="updateField(${index},'poop',this.checked)">
</td>

<td>
<input type="text"
class="editable-cell symptom-input"
value="${item.symptom || ''}"
onchange="updateField(${index},'symptom',this.value)">
</td>

<td>
<button class="btn-delete-row"
onclick="deleteRow(${index})">
<i class="fa-regular fa-trash-can"></i>
</button>
</td>

        `;

        tbody.appendChild(tr);

    });

}

renderTable();

</script>

</body>
</html>
