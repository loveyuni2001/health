<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>全家人健康智慧導航站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg:#F5F4F0;
    --black:#111;
    --white:#FFF;
    --sub:#777;
    --danger:#D93025;
    --green:#188038;
    --blue:#E8F0FE;
    --yellow:#FDF7E7;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    font-family:'Inter','Noto Sans TC',sans-serif;
    color:var(--black);
}

.container{
    max-width:1400px;
    margin:auto;
    padding:15px;
}

.portal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    border-bottom:3px solid #111;
    padding-bottom:12px;
    margin-bottom:20px;
}

.title-group h1{
    margin:0;
    font-size:24px;
}

.title-group p{
    margin:0;
    font-size:12px;
    color:#666;
}

.sync-btn{
    background:var(--green);
    color:#fff;
    border:none;
    padding:10px 16px;
    border-radius:30px;
    cursor:pointer;
    font-weight:700;
}

.double-entry-wrapper{
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:20px;
    margin-bottom:20px;
}

@media(max-width:992px){
    .double-entry-wrapper{
        grid-template-columns:1fr;
    }
}

.entry-card{
    background:#fff;
    border:2px solid #111;
    border-radius:16px;
    padding:20px;
    position:relative;
}

.step-label{
    position:absolute;
    top:-12px;
    left:20px;
    background:#111;
    color:#fff;
    padding:3px 12px;
    border-radius:30px;
    font-size:11px;
}

.box-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:15px;
}

.ai-textarea{
    width:100%;
    min-height:180px;
    border:2px solid #111;
    border-radius:12px;
    padding:12px;
    resize:none;
    font-size:14px;
}

.right-form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
}

@media(max-width:768px){

    .right-form-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .mobile-full{
        grid-column:span 2 !important;
    }

}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
}

.form-control{
    height:42px;
    border:2px solid #111;
    border-radius:12px;
    padding:8px 10px;
    font-size:14px;
    font-weight:600;
}

.form-control::placeholder{
    color:#B8B8B8;
}

.section-title{
    grid-column:span 6;
    padding:6px 10px;
    border-radius:8px;
    font-weight:700;
    font-size:13px;
}

.morning-title{
    background:var(--blue);
    color:#1A73E8;
}

.evening-title{
    background:var(--yellow);
    color:#B06000;
}

.poop-box{
    display:flex;
    justify-content:center;
    align-items:center;
    height:42px;
    border:2px solid #111;
    border-radius:12px;
}

.btn-add{
    grid-column:span 6;
    background:#111;
    color:#fff;
    border:none;
    border-radius:12px;
    padding:12px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
}

.toolbar{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:15px;
}

.filter-wrap{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.filter-box{
    border:2px solid #111;
    border-radius:30px;
    background:#fff;
    padding:6px 12px;
}

.table-card{
    background:#fff;
    border:2px solid #111;
    border-radius:16px;
    overflow:hidden;
}

.table-responsive{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1250px;
    border-collapse:separate;
    border-spacing:0;
}

th,td{
    border-right:1px solid #fff;
    border-bottom:1px solid #fff;
    padding:8px;
    text-align:center;
}

th{
    background:#111;
    color:#fff;
}

.morning-col{
    background:var(--blue);
}

.evening-col{
    background:var(--yellow);
}

.editable{
    width:100%;
    border:none;
    background:transparent;
    text-align:center;
    font-weight:700;
    font-size:14px;
}

.editable:focus{
    outline:none;
}

.warning{
    background:rgba(217,48,37,0.12);
    color:var(--danger);
    font-weight:800;
    border-radius:6px;
}

.symptom-input{
    text-align:left;
}

.delete-btn{
    border:none;
    background:none;
    cursor:pointer;
    color:#888;
}

.tip{
    margin-top:15px;
    text-align:center;
    font-size:12px;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="portal-header">

<div class="title-group">
<h1>全家人健康智慧導航站</h1>
<p>Family Health Intelligence Cloud Portal</p>
</div>

<button class="sync-btn" onclick="syncGoogle()">
<i class="fa-solid fa-cloud-arrow-up"></i>
同步至 Google Sheet
</button>

</div>

<div class="double-entry-wrapper">

<div class="entry-card">

<div class="step-label">01 智慧解析</div>

<div class="box-title">
<i class="fa-solid fa-wand-magic-sparkles"></i>
LINE 文字全解析
</div>

<textarea id="aiInput" class="ai-textarea" placeholder="貼上LINE量測文字"></textarea>

</div>

<div class="entry-card">

<div class="step-label">02 手動紀錄 / 微調區</div>

<div class="box-title">
<i class="fa-solid fa-keyboard"></i>
基礎設定與健康指標填寫
</div>

<div class="right-form-grid">

<div class="input-group mobile-full" style="grid-column:span 2;">
<label>設定日期</label>
<input type="date" id="targetDate" class="form-control">
</div>

<div class="input-group">
<label>記錄對象</label>
<select id="targetUser" class="form-control">
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="input-group">
<label>體重</label>
<input type="text" id="manualWeight" class="form-control" placeholder="57.7">
</div>

<div class="input-group">
<label>排便</label>
<div class="poop-box">
<input type="checkbox" id="manualPoop">
</div>
</div>

<div class="section-title morning-title">
☀ 【早上】指標
</div>

<div class="input-group mobile-full" style="grid-column:span 2;">
<label>早上血壓</label>
<input type="text" id="morningBP" class="form-control" placeholder="112/79">
</div>

<div class="input-group">
<label>早上心跳</label>
<input type="text" id="morningHR" class="form-control" placeholder="84">
</div>

<div class="input-group">
<label>早上血氧/心跳</label>
<input type="text" id="morningBO" class="form-control" placeholder="97/75">
</div>

<div class="section-title evening-title">
🌙 【晚上】指標
</div>

<div class="input-group mobile-full" style="grid-column:span 2;">
<label>晚上血壓</label>
<input type="text" id="eveningBP" class="form-control" placeholder="131/76">
</div>

<div class="input-group">
<label>晚上心跳</label>
<input type="text" id="eveningHR" class="form-control" placeholder="92">
</div>

<div class="input-group">
<label>晚上血氧/心跳</label>
<input type="text" id="eveningBO" class="form-control" placeholder="96/90">
</div>

<div class="input-group mobile-full" style="grid-column:span 6;">
<label>症狀與服藥備註</label>
<input type="text" id="manualSymptom" class="form-control" placeholder="特殊狀況備註">
</div>

<button class="btn-add" onclick="handleDataSubmission()">
確認新增至暫存表
</button>

</div>
</div>
</div>

<div class="toolbar">

<div style="font-weight:700;">
03 當機紀錄異動台
</div>

<div class="filter-wrap">

<div class="filter-box">
<select id="userFilter" onchange="renderTable()">
<option value="全部">全部成員</option>
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="filter-box">
<select id="monthFilter" onchange="renderTable()">
<option value="全部">全部月份</option>
</select>
</div>

</div>
</div>

<div class="table-card">
<div class="table-responsive">

<table>

<thead>

<tr>
<th rowspan="2">日期</th>
<th rowspan="2">對象</th>

<th colspan="4">【早上】紀錄</th>
<th colspan="4">【晚上】紀錄</th>

<th rowspan="2">體重</th>
<th rowspan="2">排便</th>
<th rowspan="2">症狀與服藥備註</th>
<th rowspan="2">操作</th>
</tr>

<tr>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>
</div>

<div class="tip">
資料會保存在本機與 Google Sheet
</div>

</div>

<script>

const GOOGLE_WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

document.getElementById('targetDate').valueAsDate = new Date();

let healthData =
JSON.parse(localStorage.getItem('family_health_data')) || [];

function saveLocal(){
    localStorage.setItem(
        'family_health_data',
        JSON.stringify(healthData)
    );
}

function pulseDiff(bp){

    if(!bp.includes('/')) return '';

    const p = bp.split('/');

    return parseInt(p[0]) - parseInt(p[1]);
}

function warningClass(v){
    return parseInt(v) > 100 ? 'warning' : '';
}

function parseAI(){

    const txt =
    document.getElementById('aiInput')
    .value
    .replace(/\s/g,'');

    const bpMatches =
    txt.match(/\d{2,3}-\d{2,3}-\d{2,3}/g);

    const boMatches =
    txt.match(/\d{2,3}-\d{2,3}/g);

    if(bpMatches && bpMatches[0]){

        const m =
        bpMatches[0].split('-');

        document.getElementById('morningBP').value =
        m[0]+'/'+m[1];

        document.getElementById('morningHR').value =
        m[2];
    }

    if(boMatches && boMatches[0]){

        document.getElementById('morningBO').value =
        boMatches[0].replace('-','/');
    }

    if(bpMatches && bpMatches[1]){

        const e =
        bpMatches[1].split('-');

        document.getElementById('eveningBP').value =
        e[0]+'/'+e[1];

        document.getElementById('eveningHR').value =
        e[2];
    }

    if(boMatches && boMatches[1]){

        document.getElementById('eveningBO').value =
        boMatches[1].replace('-','/');
    }

}

document
.getElementById('aiInput')
.addEventListener('input',parseAI);

function handleDataSubmission(){

    const date =
    document.getElementById('targetDate')
    .value
    .replace(/-/g,'/');

    const user =
    document.getElementById('targetUser').value;

    const obj = {

        date:date,
        user:user,

        mBP:document.getElementById('morningBP').value,
        mHR:document.getElementById('morningHR').value,
        mBO:document.getElementById('morningBO').value,

        eBP:document.getElementById('eveningBP').value,
        eHR:document.getElementById('eveningHR').value,
        eBO:document.getElementById('eveningBO').value,

        weight:document.getElementById('manualWeight').value,

        poop:document.getElementById('manualPoop').checked,

        symptom:document.getElementById('manualSymptom').value
    };

    const idx =
    healthData.findIndex(
        x=>x.date===date && x.user===user
    );

    if(idx>-1){

        healthData[idx]=obj;

    }else{

        healthData.unshift(obj);

    }

    saveLocal();

    renderTable();
}

function renderMonths(){

    const sel =
    document.getElementById('monthFilter');

    const months =
    [...new Set(
        healthData.map(x=>x.date.substring(0,7))
    )];

    sel.innerHTML =
    '<option value="全部">全部月份</option>';

    months.forEach(m=>{

        sel.innerHTML +=
        `<option value="${m}">${m}</option>`;

    });

}

function updateField(i,key,val){

    healthData[i][key]=val;

    saveLocal();

    renderTable();
}

function deleteRow(i){

    if(confirm('確定刪除？')){

        healthData.splice(i,1);

        saveLocal();

        renderTable();
    }
}

function renderTable(){

    renderMonths();

    const body =
    document.getElementById('tableBody');

    body.innerHTML='';

    const uf =
    document.getElementById('userFilter').value;

    const mf =
    document.getElementById('monthFilter').value;

    healthData.forEach((d,i)=>{

        if(uf!=='全部' && d.user!==uf) return;

        if(mf!=='全部' && !d.date.startsWith(mf)) return;

        const tr=document.createElement('tr');

        const mp=pulseDiff(d.mBP);
        const ep=pulseDiff(d.eBP);

        tr.innerHTML=`

<td>
<input type="date"
class="editable"
value="${d.date.replace(/\//g,'-')}"
onchange="updateField(${i},'date',this.value.replace(/-/g,'/'))">
</td>

<td>

<select
class="editable"
onchange="updateField(${i},'user',this.value)">

<option value="妃" ${d.user==='妃'?'selected':''}>妃</option>
<option value="爸爸" ${d.user==='爸爸'?'selected':''}>爸爸</option>
<option value="媽媽" ${d.user==='媽媽'?'selected':''}>媽媽</option>
<option value="通" ${d.user==='通'?'selected':''}>通</option>

</select>

</td>

<td class="morning-col">
<input class="editable"
value="${d.mBP}"
onchange="updateField(${i},'mBP',this.value)">
</td>

<td class="morning-col ${mp>60?'warning':''}">
${mp}
</td>

<td class="morning-col">
<input class="editable ${warningClass(d.mHR)}"
value="${d.mHR}"
onchange="updateField(${i},'mHR',this.value)">
</td>

<td class="morning-col">
<input class="editable"
value="${d.mBO}"
onchange="updateField(${i},'mBO',this.value)">
</td>

<td class="evening-col">
<input class="editable"
value="${d.eBP}"
onchange="updateField(${i},'eBP',this.value)">
</td>

<td class="evening-col ${ep>60?'warning':''}">
${ep}
</td>

<td class="evening-col">
<input class="editable ${warningClass(d.eHR)}"
value="${d.eHR}"
onchange="updateField(${i},'eHR',this.value)">
</td>

<td class="evening-col">
<input class="editable"
value="${d.eBO}"
onchange="updateField(${i},'eBO',this.value)">
</td>

<td>
<input class="editable"
value="${d.weight}"
onchange="updateField(${i},'weight',this.value)">
</td>

<td>
<input type="checkbox"
${d.poop?'checked':''}
onchange="updateField(${i},'poop',this.checked)">
</td>

<td>
<input class="editable symptom-input"
value="${d.symptom}"
onchange="updateField(${i},'symptom',this.value)">
</td>

<td>
<button class="delete-btn"
onclick="deleteRow(${i})">
🗑
</button>
</td>

`;

        body.appendChild(tr);

    });

}

async function syncGoogle(){

    try{

        const res =
        await fetch(GOOGLE_WEB_APP_URL,{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(healthData)

        });

        const txt = await res.text();

        alert('同步成功');

    }catch(err){

        console.error(err);

        alert('同步失敗');
    }
}

renderTable();

</script>

</body>
</html>
