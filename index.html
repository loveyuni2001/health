<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>全家人健康智慧導航站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --bg-color: #F5F4F0;
    --primary-black: #111111;
    --card-bg: #FFFFFF;
    --text-sub: #5F6368;
    --danger: #D93025;
    --success-green: #188038;
    --light-blue: #E8F0FE;
    --light-yellow: #FDF7E7;
}

* {
    box-sizing: border-box;
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    overflow-x: hidden;
    background: var(--bg-color);
    font-family: 'Inter', 'Noto Sans TC', sans-serif;
}

body {
    padding: 10px;
}

.container {
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
}

.portal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 3px solid #111;
    padding-bottom: 12px;
    margin-bottom: 20px;
    gap: 10px;
    flex-wrap: wrap;
}

.title-group h1 {
    margin: 0;
    font-size: 42px;
    font-weight: 700;
}

.title-group p {
    margin: 4px 0 0;
    color: #666;
    font-size: 15px;
}

.sync-btn-container {
    display: flex;
    align-items: center;
    gap: 10px;
}

.btn-sync-cloud {
    background: #188038;
    color: white;
    border: 2px solid #111;
    border-radius: 999px;
    padding: 12px 20px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 700;
}

.double-entry-wrapper {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 25px;
}

.entry-card {
    background: white;
    border: 2px solid #111;
    border-radius: 24px;
    padding: 20px;
    position: relative;
}

.step-label {
    position: absolute;
    top: -14px;
    left: 24px;
    background: black;
    color: white;
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 700;
}

.box-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
}

.ai-textarea {
    width: 100%;
    min-height: 500px;
    border: 2px solid #111;
    border-radius: 20px;
    padding: 18px;
    resize: none;
    font-size: 18px;
}

.right-form-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
}

.input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.input-group label {
    font-size: 14px;
    font-weight: 700;
}

.form-control {
    height: 54px;
    border: 2px solid #111;
    border-radius: 16px;
    padding: 10px;
    font-size: 18px;
}

.sub-section-title {
    grid-column: span 6;
    padding: 12px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 18px;
}

.title-morning {
    background: var(--light-blue);
    color: #1A73E8;
}

.title-evening {
    background: var(--light-yellow);
    color: #B06000;
}

.btn-submit-container {
    grid-column: span 6;
}

.btn-ai {
    width: 100%;
    background: black;
    color: white;
    border: none;
    border-radius: 18px;
    padding: 16px;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
}

.toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 12px;
}

.filter-container {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.select-box-wrapper {
    background: white;
    border: 2px solid #111;
    border-radius: 999px;
    padding: 10px 14px;
}

.filter-select {
    border: none;
    background: transparent;
    font-size: 16px;
}

.table-card {
    background: white;
    border: 2px solid #111;
    border-radius: 24px;
    overflow: hidden;
}

.table-responsive {
    width: 100%;
    overflow-x: auto;
}

.table-responsive::-webkit-scrollbar {
    height: 12px;
}

.table-responsive::-webkit-scrollbar-thumb {
    background: #bbb;
    border-radius: 999px;
}

.table-responsive table {
    width: 100%;
    min-width: 1500px;
    border-collapse: collapse;
}

th {
    background: black;
    color: white;
    padding: 14px;
    border-right: 2px solid #333;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    border-right: 1px solid #ddd;
    text-align: center;
}

.editable-cell {
    width: 100%;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 8px;
    font-size: 15px;
}

.btn-delete-row {
    background: #D93025;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 10px;
    cursor: pointer;
}

.loading-spinner {
    display: none;
    font-weight: 700;
}

/* ===== 手機版完整優化 ===== */
@media (max-width: 768px) {

    body{
        overflow-x:hidden;
    }

    .container{
        width:100%;
        max-width:100%;
        padding:10px;
    }

    .portal-header{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .title-group h1{
        font-size:20px;
        line-height:1.3;
    }

    .sync-btn-container{
        width:100%;
    }

    .btn-sync-cloud{
        width:100%;
        justify-content:center;
        font-size:15px;
    }

    .double-entry-wrapper{
        grid-template-columns:1fr !important;
        gap:15px;
    }

    .entry-card{
        padding:14px;
        border-radius:18px;
    }

    .right-form-grid{
        grid-template-columns:1fr 1fr !important;
        gap:10px;
    }

    .input-group{
        grid-column:span 1 !important;
    }

    .sp-mobile-full{
        grid-column:span 2 !important;
    }

    .sub-section-title{
        grid-column:span 2 !important;
    }

    .btn-submit-container{
        grid-column:span 2 !important;
    }

    .form-control{
        height:44px;
        font-size:16px;
    }

    .ai-textarea{
        min-height:220px;
        font-size:16px;
    }

    .toolbar{
        flex-direction:column;
        align-items:flex-start;
    }

    .filter-container{
        width:100%;
        display:flex;
        gap:10px;
    }

    .select-box-wrapper{
        flex:1;
    }

    .filter-select{
        width:100%;
        font-size:15px;
    }

    .table-card{
        overflow:hidden;
        border-radius:20px;
    }

    .table-responsive{
        width:100%;
        overflow-x:auto;
        -webkit-overflow-scrolling:touch;
    }

    table{
        min-width:1200px;
    }

    th{
        font-size:13px;
        padding:10px 6px;
        white-space:nowrap;
    }

    td{
        padding:6px;
        font-size:13px;
    }

    .editable-cell{
        min-width:80px;
        font-size:14px;
        padding:6px;
    }

}
</style>
</head>
<body>

<div class="container">

<div class="portal-header">
    <div class="title-group">
        <h1>全家人健康智慧導航站</h1>
        <p>Family Health Intelligence Cloud Portal</p>
    </div>

    <div class="sync-btn-container">
        <span id="loadingTxt" class="loading-spinner">同步中...</span>
        <button class="btn-sync-cloud" onclick="syncWithGoogleSheet()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            同步至 Google Sheet 備份
        </button>
    </div>
</div>

<div class="double-entry-wrapper">

<div class="entry-card">
<div class="step-label">01 智慧解析</div>
<div class="box-title">LINE 文字全解析</div>
<textarea id="aiInput" class="ai-textarea" placeholder="在此貼上 LINE 辨識文字..."></textarea>
</div>

<div class="entry-card">
<div class="step-label">02 手動紀錄 / 微調區</div>
<div class="box-title">基礎設定與健康指標填寫</div>

<div class="right-form-grid">

<div class="input-group" style="grid-column: span 2;">
<label>設定日期</label>
<input type="date" id="targetDate" class="form-control">
</div>

<div class="input-group" style="grid-column: span 2;">
<label>記錄對象</label>
<select id="targetUser" class="form-control">
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="input-group" style="grid-column: span 2;">
<label>體重</label>
<input type="text" id="manualWeight" class="form-control">
</div>

<div class="sub-section-title title-morning">☀️【早上】指標</div>

<div class="input-group" style="grid-column: span 2;">
<label>早上血壓</label>
<input type="text" id="morningBP" class="form-control">
</div>

<div class="input-group" style="grid-column: span 2;">
<label>早上心跳</label>
<input type="text" id="morningHR" class="form-control">
</div>

<div class="input-group" style="grid-column: span 2;">
<label>早上血氧/心跳</label>
<input type="text" id="morningBO" class="form-control">
</div>

<div class="sub-section-title title-evening">🌙【晚上】指標</div>

<div class="input-group" style="grid-column: span 2;">
<label>晚上血壓</label>
<input type="text" id="eveningBP" class="form-control">
</div>

<div class="input-group" style="grid-column: span 2;">
<label>晚上心跳</label>
<input type="text" id="eveningHR" class="form-control">
</div>

<div class="input-group" style="grid-column: span 2;">
<label>晚上血氧/心跳</label>
<input type="text" id="eveningBO" class="form-control">
</div>

<div class="input-group" style="grid-column: span 6;">
<label>備註</label>
<input type="text" id="manualSymptom" class="form-control">
</div>

<div class="btn-submit-container">
<button class="btn-ai" onclick="handleDataSubmission()">＋ 確認新增至暫存表</button>
</div>

</div>
</div>
</div>

<div class="toolbar">
<div style="font-size:22px;font-weight:700;">03 雲端健康紀錄</div>

<div class="filter-container">
<div class="select-box-wrapper">
<select id="userFilter" class="filter-select" onchange="renderTable()">
<option value="全部">全部成員</option>
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="select-box-wrapper">
<select id="monthFilter" class="filter-select" onchange="renderTable()">
<option value="全部">全部月份</option>
</select>
</div>
</div>
</div>

<div class="table-card">
<div class="table-responsive">
<table>
<thead>
<tr>
<th>日期</th>
<th>對象</th>
<th>早上血壓</th>
<th>早上心跳</th>
<th>早上血氧</th>
<th>晚上血壓</th>
<th>晚上心跳</th>
<th>晚上血氧</th>
<th>體重</th>
<th>備註</th>
<th>刪除</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>
</div>

</div>

<script>

const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

let healthData = JSON.parse(localStorage.getItem('family_health_data')) || [];

document.getElementById('targetDate').valueAsDate = new Date();

function saveDataToLocal(){
    localStorage.setItem('family_health_data', JSON.stringify(healthData));
}

function formatDate(dateString){
    const d = new Date(dateString);

    if (isNaN(d)) return dateString;

    const year = d.getFullYear();
    const month = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');

    return `${year}/${month}/${day}`;
}

function handleDataSubmission(){

    const record = {
        date: document.getElementById('targetDate').value.replace(/-/g,'/'),
        user: document.getElementById('targetUser').value,
        mBP: document.getElementById('morningBP').value,
        mHR: document.getElementById('morningHR').value,
        mBO: document.getElementById('morningBO').value,
        eBP: document.getElementById('eveningBP').value,
        eHR: document.getElementById('eveningHR').value,
        eBO: document.getElementById('eveningBO').value,
        weight: document.getElementById('manualWeight').value,
        symptom: document.getElementById('manualSymptom').value
    };

    healthData.unshift(record);

    saveDataToLocal();
    renderTable();

    alert('新增成功');
}

function renderTable(){

    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = '';

    const filterUser = document.getElementById('userFilter').value;
    const filterMonth = document.getElementById('monthFilter').value;

    const months = [...new Set(healthData.map(d => d.date.substring(0,7)))];

    const monthFilter = document.getElementById('monthFilter');

    if(monthFilter.options.length <= 1){
        months.forEach(m => {
            const op = document.createElement('option');
            op.value = m;
            op.textContent = m;
            monthFilter.appendChild(op);
        });
    }

    healthData.forEach((item,index)=>{

        if(filterUser !== '全部' && item.user !== filterUser) return;
        if(filterMonth !== '全部' && !item.date.startsWith(filterMonth)) return;

        const tr = document.createElement('tr');

        tr.innerHTML = `
        <td>${formatDate(item.date)}</td>
        <td>${item.user || ''}</td>
        <td><input class="editable-cell" value="${item.mBP || ''}" onchange="updateField(${index},'mBP',this.value)"></td>
        <td><input class="editable-cell" value="${item.mHR || ''}" onchange="updateField(${index},'mHR',this.value)"></td>
        <td><input class="editable-cell" value="${item.mBO || ''}" onchange="updateField(${index},'mBO',this.value)"></td>
        <td><input class="editable-cell" value="${item.eBP || ''}" onchange="updateField(${index},'eBP',this.value)"></td>
        <td><input class="editable-cell" value="${item.eHR || ''}" onchange="updateField(${index},'eHR',this.value)"></td>
        <td><input class="editable-cell" value="${item.eBO || ''}" onchange="updateField(${index},'eBO',this.value)"></td>
        <td><input class="editable-cell" value="${item.weight || ''}" onchange="updateField(${index},'weight',this.value)"></td>
        <td><input class="editable-cell" value="${item.symptom || ''}" onchange="updateField(${index},'symptom',this.value)"></td>
        <td><button class="btn-delete-row" onclick="deleteRow(${index})">刪除</button></td>
        `;

        tableBody.appendChild(tr);
    });
}

function updateField(index, field, value){
    healthData[index][field] = value;
    saveDataToLocal();
}

function deleteRow(index){

    if(confirm('確定刪除？')){
        healthData.splice(index,1);
        saveDataToLocal();
        renderTable();
    }
}

async function syncWithGoogleSheet(){

    if(GOOGLE_WEB_APP_URL.includes('貼上')){
        alert('請先貼 Apps Script 網址');
        return;
    }

    document.getElementById('loadingTxt').style.display = 'inline-block';

    try {

        await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(healthData)
        });

        alert('同步成功');

    } catch(err){

        console.error(err);
        alert('同步失敗');

    }

    document.getElementById('loadingTxt').style.display = 'none';
}

async function loadDataFromCloud() {

    try {

        const response = await fetch(GOOGLE_WEB_APP_URL);

        const data = await response.json();

        healthData = data || [];

        renderTable();

    } catch(err) {

        console.error(err);

        alert("讀取雲端資料失敗");

    }

}

window.onload = async function(){
    await loadDataFromCloud();
    renderTable();
}

</script>
</body>
</html>
