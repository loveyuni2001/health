<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>全家人健康智慧導航站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
    --bg:#F5F4F0;
    --black:#111111;
    --white:#FFFFFF;
    --sub:#5F6368;
    --danger:#D93025;
    --green:#188038;
    --blue:#E8F0FE;
    --yellow:#FDF7E7;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family:'Inter','Noto Sans TC',sans-serif;
    color:var(--black);
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:15px;
}

/* HEADER */

.portal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    border-bottom:3px solid var(--black);
    padding-bottom:12px;
    margin-bottom:20px;
}

.title-group h1{
    margin:0;
    font-size:24px;
    font-weight:700;
}

.title-group p{
    margin:2px 0 0;
    font-size:12px;
    color:var(--sub);
    font-weight:700;
}

.sync-btn-container{
    display:flex;
    align-items:center;
    gap:10px;
}

.btn-sync{
    background:var(--green);
    color:#fff;
    border:2px solid var(--black);
    border-radius:30px;
    padding:10px 18px;
    cursor:pointer;
    font-weight:700;
    box-shadow:0 3px 0 var(--black);
}

.btn-sync:active{
    transform:translateY(2px);
    box-shadow:0 1px 0 var(--black);
}

.loading{
    display:none;
    font-size:13px;
    font-weight:700;
    color:var(--green);
}

/* GRID */

.double-wrapper{
    display:grid;
    grid-template-columns:1fr;
    gap:20px;
    margin-bottom:25px;
}

@media(min-width:992px){
    .double-wrapper{
        grid-template-columns:1fr 1.2fr;
    }
}

.card{
    background:#fff;
    border:2px solid var(--black);
    border-radius:16px;
    padding:20px;
    position:relative;
}

.step-label{
    position:absolute;
    top:-12px;
    left:20px;
    background:var(--black);
    color:#fff;
    font-size:11px;
    padding:3px 12px;
    border-radius:30px;
    font-weight:700;
}

.box-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:15px;
}

/* TEXTAREA */

.ai-textarea{
    width:100%;
    min-height:180px;
    border:2px solid var(--black);
    border-radius:12px;
    padding:12px;
    resize:none;
    font-size:14px;
    background:#FAFAFA;
    line-height:1.5;
}

/* FORM */

.form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
}

.form-control{
    width:100%;
    height:42px;
    border:2px solid var(--black);
    border-radius:12px;
    padding:8px 10px;
    font-size:14px;
    font-weight:600;
    background:#fff;
}

.sub-title{
    grid-column:span 6;
    padding:6px 10px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
}

.morning-title{
    background:var(--blue);
    color:#1A73E8;
}

.evening-title{
    background:var(--yellow);
    color:#B06000;
}

.poop-box{
    height:42px;
    border:2px solid var(--black);
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.btn-submit{
    grid-column:span 6;
    height:48px;
    border:none;
    border-radius:12px;
    background:var(--black);
    color:#fff;
    font-weight:700;
    cursor:pointer;
    font-size:15px;
}

/* TOOLBAR */

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    border-top:3px solid var(--black);
    padding-top:15px;
    margin-bottom:15px;
}

.filter-container{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.filter-box{
    background:#fff;
    border:2px solid var(--black);
    border-radius:30px;
    padding:5px 12px;
}

.filter-select{
    border:none;
    background:none;
    font-weight:700;
    cursor:pointer;
}

/* TABLE */

.table-card{
    background:#fff;
    border:2px solid var(--black);
    border-radius:16px;
    overflow:hidden;
}

.table-responsive{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1250px;
    border-collapse:separate;
    border-spacing:0;
    text-align:center;
}

th{
    background:var(--black);
    color:#fff;
    padding:10px 8px;
    font-size:14px;
    border-right:2px solid #333;
}

td{
    padding:8px;
    border-right:2px solid #fff;
    border-bottom:2px solid #fff;
    background:#F8F8F8;
}

.morning-col{
    background:var(--blue);
}

.evening-col{
    background:var(--yellow);
}

.editable{
    width:100%;
    border:2px solid transparent;
    background:transparent;
    padding:4px;
    border-radius:6px;
    font-size:14px;
    text-align:center;
    font-weight:700;
}

.editable:focus{
    border:2px solid var(--black);
    background:#fff;
}

.warning{
    color:var(--danger);
    font-weight:800;
    background:rgba(217,48,37,.15);
    border-radius:4px;
    padding:3px 6px;
}

.delete-btn{
    border:none;
    background:none;
    color:#777;
    cursor:pointer;
}

.delete-btn:hover{
    color:var(--danger);
}

.tip{
    text-align:center;
    color:var(--sub);
    margin-top:15px;
    font-size:12px;
    font-weight:700;
}

/* MOBILE */

@media(max-width:576px){

    .form-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .full-mobile{
        grid-column:span 2 !important;
    }

    .sub-title{
        grid-column:span 2 !important;
    }

    .btn-submit{
        grid-column:span 2 !important;
    }

    .portal-header{
        align-items:flex-start;
    }

}

</style>
</head>

<body>

<div class="container">

<div class="portal-header">

<div class="title-group">
<h1>全家人健康智慧導航站</h1>
<p>Family Health Intelligence Cloud Portal</p>
</div>

<div class="sync-btn-container">

<span class="loading" id="loadingTxt">
<i class="fa-solid fa-spinner fa-spin"></i>
同步中...
</span>

<button class="btn-sync" onclick="syncGoogleSheet()">
<i class="fa-solid fa-cloud-arrow-up"></i>
同步 Google Sheet
</button>

</div>

</div>

<div class="double-wrapper">

<!-- LEFT -->

<div class="card">

<div class="step-label">01 智慧解析</div>

<div class="box-title">
<i class="fa-solid fa-wand-magic-sparkles"></i>
LINE 文字全解析
</div>

<textarea
id="aiInput"
class="ai-textarea"
placeholder="貼上 LINE 文字，例如：

早上 112-79-84 97-75
晚上 131-76-99 96-95
"></textarea>

</div>

<!-- RIGHT -->

<div class="card">

<div class="step-label">02 手動紀錄 / 微調區</div>

<div class="box-title">
<i class="fa-solid fa-keyboard"></i>
基礎設定與健康指標填寫
</div>

<div class="form-grid">

<div class="input-group full-mobile" style="grid-column:span 2;">
<label>設定日期</label>
<input type="date" id="targetDate" class="form-control">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>記錄對象</label>
<select id="targetUser" class="form-control">
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="input-group" style="grid-column:span 1;">
<label>體重</label>
<input type="text" id="manualWeight" class="form-control" placeholder="57.7">
</div>

<div class="input-group" style="grid-column:span 1;">
<label>排便</label>

<div class="poop-box">
<input type="checkbox" id="manualPoop">
</div>

</div>

<div class="sub-title morning-title">
<i class="fa-solid fa-sun"></i>
【早上】指標
</div>

<div class="input-group">
<label>早上血壓</label>
<input type="text" id="morningBP" class="form-control" placeholder="112/79">
</div>

<div class="input-group">
<label>早上心跳</label>
<input type="text" id="morningHR" class="form-control" placeholder="84">
</div>

<div class="input-group full-mobile" style="grid-column:span 2;">
<label>早上血氧/心跳</label>
<input type="text" id="morningBO" class="form-control" placeholder="97/75">
</div>

<div class="sub-title evening-title">
<i class="fa-solid fa-moon"></i>
【晚上】指標
</div>

<div class="input-group">
<label>晚上血壓</label>
<input type="text" id="eveningBP" class="form-control" placeholder="131/76">
</div>

<div class="input-group">
<label>晚上心跳</label>
<input type="text" id="eveningHR" class="form-control" placeholder="99">
</div>

<div class="input-group full-mobile" style="grid-column:span 2;">
<label>晚上血氧/心跳</label>
<input type="text" id="eveningBO" class="form-control" placeholder="96/95">
</div>

<div class="input-group full-mobile" style="grid-column:span 6;">
<label>症狀與服藥備註</label>
<input type="text" id="manualSymptom" class="form-control" placeholder="特殊狀況備註...">
</div>

<button class="btn-submit" onclick="handleDataSubmission()">
<i class="fa-solid fa-plus"></i>
確認新增至暫存表
</button>

</div>

</div>

</div>

<!-- TOOLBAR -->

<div class="toolbar">

<div style="font-weight:700;">
<i class="fa-solid fa-table-list"></i>
03 當前紀錄
</div>

<div class="filter-container">

<div class="filter-box">
<label>成員：</label>
<select id="userFilter" class="filter-select" onchange="renderTable()">
<option value="全部">全部</option>
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="filter-box">
<label>月份：</label>
<select id="monthFilter" class="filter-select" onchange="renderTable()">
<option value="全部">全部</option>
</select>
</div>

</div>

</div>

<!-- TABLE -->

<div class="table-card">

<div class="table-responsive">

<table>

<thead>

<tr>
<th rowspan="2">日期</th>
<th rowspan="2">對象</th>

<th colspan="4">【早上】紀錄</th>

<th colspan="4">【晚上】紀錄</th>

<th rowspan="2">體重</th>
<th rowspan="2">排便</th>
<th rowspan="2">症狀與服藥備註</th>
<th rowspan="2">操作</th>
</tr>

<tr>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<div class="tip">
資料會先存在本地，再同步到 Google Sheet
</div>

</div>

<script>

const GOOGLE_WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

document.getElementById('targetDate').valueAsDate = new Date();

let healthData =
JSON.parse(localStorage.getItem('family_health_data')) || [];

function saveLocal(){
    localStorage.setItem(
        'family_health_data',
        JSON.stringify(healthData)
    );
}

function pulseDiff(bp){

    if(!bp || !bp.includes('/')){
        return {value:'—', className:''};
    }

    const arr = bp.split('/');

    const diff =
        parseInt(arr[0]) -
        parseInt(arr[1]);

    if(isNaN(diff)){
        return {value:'—', className:''};
    }

    return {
        value:diff,
        className: diff > 60 ? 'warning' : ''
    };

}

function hrClass(hr){

    return parseInt(hr) > 100
        ? 'warning'
        : '';

}

/* LINE 解析 */

function parseText(){

    const text =
        document.getElementById('aiInput')
        .value
        .replace(/\s+/g,'');

    if(!text) return;

    const morning =
        text.match(/早.*?(\d{2,3})-(\d{2,3})-(\d{2,3}).*?(\d{2,3})-(\d{2,3})/);

    const evening =
        text.match(/晚.*?(\d{2,3})-(\d{2,3})-(\d{2,3}).*?(\d{2,3})-(\d{2,3})/);

    if(morning){

        document.getElementById('morningBP').value =
            morning[1] + '/' + morning[2];

        document.getElementById('morningHR').value =
            morning[3];

        document.getElementById('morningBO').value =
            morning[4] + '/' + morning[5];

    }

    if(evening){

        document.getElementById('eveningBP').value =
            evening[1] + '/' + evening[2];

        document.getElementById('eveningHR').value =
            evening[3];

        document.getElementById('eveningBO').value =
            evening[4] + '/' + evening[5];

    }

}

document.getElementById('aiInput')
.addEventListener('input', parseText);

/* 新增 */

function handleDataSubmission(){

    parseText();

    const date =
        document.getElementById('targetDate')
        .value
        .replace(/-/g,'/');

    const user =
        document.getElementById('targetUser')
        .value;

    const obj = {

        date:date,
        user:user,

        mBP:document.getElementById('morningBP').value,
        mHR:document.getElementById('morningHR').value,
        mBO:document.getElementById('morningBO').value,

        eBP:document.getElementById('eveningBP').value,
        eHR:document.getElementById('eveningHR').value,
        eBO:document.getElementById('eveningBO').value,

        weight:document.getElementById('manualWeight').value,

        poop:document.getElementById('manualPoop').checked,

        symptom:document.getElementById('manualSymptom').value

    };

    const idx =
        healthData.findIndex(d =>
            d.date === obj.date &&
            d.user === obj.user
        );

    if(idx !== -1){

        healthData[idx] = obj;

    }else{

        healthData.unshift(obj);

    }

    saveLocal();

    renderTable();

    alert('已新增 / 更新');

}

/* 月份篩選 */

function buildMonthFilter(){

    const select =
        document.getElementById('monthFilter');

    const months =
        [...new Set(
            healthData.map(d =>
                d.date.substring(0,7)
            )
        )];

    select.innerHTML =
        '<option value="全部">全部</option>';

    months.sort().reverse();

    months.forEach(m => {

        const option =
            document.createElement('option');

        option.value = m;

        option.textContent =
            m.replace('/','年 ') + '月';

        select.appendChild(option);

    });

}

/* TABLE */

function renderTable(){

    buildMonthFilter();

    const body =
        document.getElementById('tableBody');

    body.innerHTML = '';

    const userFilter =
        document.getElementById('userFilter').value;

    const monthFilter =
        document.getElementById('monthFilter').value;

    healthData.forEach((item,index)=>{

        if(
            userFilter !== '全部' &&
            item.user !== userFilter
        ) return;

        if(
            monthFilter !== '全部' &&
            !item.date.startsWith(monthFilter)
        ) return;

        const mPulse =
            pulseDiff(item.mBP);

        const ePulse =
            pulseDiff(item.eBP);

        const tr =
            document.createElement('tr');

        tr.innerHTML = `

<td>${item.date}</td>

<td>${item.user}</td>

<td class="morning-col">${item.mBP || ''}</td>

<td class="morning-col ${mPulse.className}">
${mPulse.value}
</td>

<td class="morning-col">
<span class="${hrClass(item.mHR)}">
${item.mHR || ''}
</span>
</td>

<td class="morning-col">${item.mBO || ''}</td>

<td class="evening-col">${item.eBP || ''}</td>

<td class="evening-col ${ePulse.className}">
${ePulse.value}
</td>

<td class="evening-col">
<span class="${hrClass(item.eHR)}">
${item.eHR || ''}
</span>
</td>

<td class="evening-col">${item.eBO || ''}</td>

<td>${item.weight || ''}</td>

<td>
<input
type="checkbox"
${item.poop ? 'checked' : ''}
disabled
>
</td>

<td style="text-align:left;">
${item.symptom || ''}
</td>

<td>
<button
class="delete-btn"
onclick="deleteRow(${index})"
>
<i class="fa-regular fa-trash-can"></i>
</button>
</td>

`;

        body.appendChild(tr);

    });

}

/* DELETE */

function deleteRow(index){

    if(confirm('確定刪除？')){

        healthData.splice(index,1);

        saveLocal();

        renderTable();

    }

}

/* SYNC */

async function syncGoogleSheet(){

    if(healthData.length === 0){
        alert('目前沒有資料');
        return;
    }

    const loading =
        document.getElementById('loadingTxt');

    loading.style.display = 'inline-block';

    try{

        const response =
            await fetch(
                GOOGLE_WEB_APP_URL,
                {
                    method:'POST',
                    headers:{
                        'Content-Type':'application/json'
                    },
                    body:JSON.stringify(healthData)
                }
            );

        const result =
            await response.json();

        loading.style.display = 'none';

        if(result.status === 'success'){

            alert('同步成功');

        }else{

            alert('同步失敗');

        }

    }catch(err){

        loading.style.display = 'none';

        console.error(err);

        alert('同步失敗');

    }

}

renderTable();

</script>

</body>
</html>
