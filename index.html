<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>全家人健康智慧導航站 - 雲端連動版</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg-color:#F5F4F0;
    --primary-black:#111111;
    --card-bg:#FFFFFF;
    --text-sub:#5F6368;
    --danger:#D93025;
    --success-green:#188038;
    --light-blue:#E8F0FE;
    --light-yellow:#FDF7E7;
}

*{
    box-sizing:border-box;
}

body{
    background-color:var(--bg-color);
    margin:0;
    padding:0;
    font-family:'Inter','Noto Sans TC',sans-serif;
    color:var(--primary-black);
    -webkit-font-smoothing:antialiased;
}

.container{
    width:100%;
    max-width:1300px;
    margin:0 auto;
    padding:14px;
}

/* HEADER */

.portal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    border-bottom:3px solid var(--primary-black);
    padding-bottom:12px;
    flex-wrap:wrap;
    gap:10px;
}

.title-group h1{
    font-size:24px;
    font-weight:700;
    margin:0;
}

.title-group p{
    font-size:12px;
    color:var(--text-sub);
    margin:4px 0 0 0;
    font-weight:700;
}

.sync-btn-container{
    display:flex;
    align-items:center;
    gap:10px;
}

.btn-sync-cloud{
    background:var(--success-green);
    color:#fff;
    border:2px solid var(--primary-black);
    padding:8px 16px;
    border-radius:30px;
    font-weight:700;
    font-size:14px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:8px;
    box-shadow:0 3px 0 var(--primary-black);
}

.btn-sync-cloud:active{
    transform:translateY(2px);
    box-shadow:0 1px 0 var(--primary-black);
}

.loading-spinner{
    display:none;
    font-size:13px;
    color:var(--success-green);
    font-weight:700;
}

/* 上方雙欄 */

.double-entry-wrapper{
    display:grid;
    grid-template-columns:1fr;
    gap:18px;
    margin-bottom:24px;
}

@media(min-width:1100px){
    .double-entry-wrapper{
        grid-template-columns:1fr 1.15fr;
    }
}

.entry-card{
    background:var(--card-bg);
    border:2px solid var(--primary-black);
    border-radius:16px;
    padding:18px;
    position:relative;
    box-shadow:0 4px 0 rgba(0,0,0,.05);
}

.step-label{
    position:absolute;
    top:-12px;
    left:18px;
    background:var(--primary-black);
    color:#fff;
    font-size:11px;
    font-weight:700;
    padding:3px 12px;
    border-radius:30px;
}

.box-title{
    font-size:16px;
    font-weight:700;
    margin-bottom:14px;
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:5px;
}

.ai-textarea{
    width:100%;
    min-height:160px;
    resize:none;
    background:#FAFAFA;
    border:2px solid var(--primary-black);
    border-radius:12px;
    color:var(--primary-black);
    padding:12px;
    font-size:14px;
    line-height:1.5;
    outline:none;
}

/* FORM */

.right-form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
}

.form-control{
    background:#FFFFFF;
    border:2px solid var(--primary-black);
    padding:8px 10px;
    border-radius:12px;
    color:var(--primary-black);
    font-size:14px;
    font-weight:600;
    outline:none;
    width:100%;
    height:40px;
}

.form-control::placeholder{
    color:#999;
    font-weight:500;
}

.sub-section-title{
    grid-column:span 6;
    font-size:13px;
    font-weight:700;
    padding:6px;
    border-radius:8px;
    display:flex;
    align-items:center;
    gap:6px;
}

.title-morning{
    background:var(--light-blue);
    color:#1A73E8;
}

.title-evening{
    background:var(--light-yellow);
    color:#B06000;
}

.poop-switch-container{
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    border:2px solid var(--primary-black);
    border-radius:12px;
    height:40px;
    cursor:pointer;
}

.main-checkbox{
    width:18px;
    height:18px;
    cursor:pointer;
    accent-color:var(--primary-black);
}

.btn-submit-container{
    grid-column:span 6;
}

.btn-ai{
    background:var(--primary-black);
    color:white;
    border:none;
    padding:12px;
    border-radius:12px;
    width:100%;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
}

@media(max-width:768px){

    .container{
        padding:10px;
    }

    .right-form-grid{
        grid-template-columns:repeat(2,1fr);
    }

    .sub-section-title,
    .btn-submit-container{
        grid-column:span 2 !important;
    }

}

/* toolbar */

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:10px;
    border-top:3px solid var(--primary-black);
    padding-top:14px;
    margin-bottom:14px;
}

.filter-container{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.select-box-wrapper{
    background:#fff;
    border:2px solid var(--primary-black);
    padding:4px 12px;
    border-radius:30px;
    display:flex;
    align-items:center;
    gap:6px;
}

.filter-select{
    border:none;
    background:transparent;
    outline:none;
    font-weight:700;
}

/* table */

.table-card{
    background:#fff;
    border-radius:16px;
    border:2px solid var(--primary-black);
    overflow:hidden;
    margin-bottom:20px;
}

.table-responsive{
    overflow-x:auto;
    -webkit-overflow-scrolling:touch;
}

table{
    width:100%;
    min-width:1180px;
    border-collapse:separate;
    border-spacing:0;
    text-align:center;
}

th,td{
    padding:9px 8px;
    font-size:14px;
    border-right:1px solid #fff;
    border-bottom:1px solid #fff;
}

th{
    background:var(--primary-black);
    color:#fff;
    font-weight:700;
}

td{
    background:#FAFAFA;
}

.morning-col{
    background:var(--light-blue);
}

.evening-col{
    background:var(--light-yellow);
}

.editable-cell{
    background:transparent;
    border:2px solid transparent;
    border-radius:6px;
    padding:4px;
    width:100%;
    text-align:center;
    font-size:14px;
    font-weight:700;
    outline:none;
}

.editable-cell:focus{
    border:2px solid var(--primary-black);
    background:#fff;
}

.editable-cell::placeholder{
    color:#999;
}

.value-warning{
    color:var(--danger) !important;
    font-weight:800 !important;
    background:rgba(217,48,37,0.12) !important;
    border-radius:6px;
}

.poop-checkbox{
    width:18px;
    height:18px;
    cursor:pointer;
}

.symptom-input{
    text-align:left;
}

.btn-delete-row{
    background:transparent;
    border:none;
    color:#777;
    cursor:pointer;
    font-size:14px;
}

.btn-delete-row:hover{
    color:var(--danger);
}

.tip-text{
    text-align:center;
    color:var(--text-sub);
    font-size:12px;
    font-weight:700;
    margin-top:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="portal-header">

    <div class="title-group">
        <h1>全家人健康智慧導航站</h1>
        <p>Family Health Intelligence Cloud Portal</p>
    </div>

    <div class="sync-btn-container">

        <span id="loadingTxt" class="loading-spinner">
            <i class="fa-solid fa-spinner fa-spin"></i>
            雲端同步中...
        </span>

        <button class="btn-sync-cloud" onclick="syncWithGoogleSheet()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            同步至 Google Sheet 備份
        </button>

    </div>

</div>

<div class="double-entry-wrapper">

    <!-- 左側 -->
    <div class="entry-card">

        <div class="step-label">01 智慧解析</div>

        <div class="box-title">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            LINE 文字全解析
        </div>

        <textarea id="aiInput" class="ai-textarea" placeholder="在此貼上 LINE 辨識文字..."></textarea>

    </div>

    <!-- 右側 -->
    <div class="entry-card">

        <div class="step-label">02 手動紀錄 / 微調區</div>

        <div class="box-title">
            <i class="fa-solid fa-keyboard"></i>
            基礎設定與健康指標填寫
        </div>

        <div class="right-form-grid">

            <div class="input-group" style="grid-column:span 2;">
                <label>設定日期</label>
                <input type="date" id="targetDate" class="form-control">
            </div>

            <div class="input-group" style="grid-column:span 2;">
                <label>記錄對象</label>

                <select id="targetUser" class="form-control">
                    <option value="妃">妃</option>
                    <option value="爸爸">爸爸</option>
                    <option value="媽媽">媽媽</option>
                    <option value="通">通</option>
                </select>
            </div>

            <div class="input-group" style="grid-column:span 1;">
                <label>體重 (kg)</label>
                <input type="text" id="manualWeight" class="form-control" placeholder="57.7">
            </div>

            <div class="input-group" style="grid-column:span 1;">
                <label>排便</label>

                <div class="poop-switch-container">
                    <input type="checkbox" id="manualPoop" class="main-checkbox">
                </div>
            </div>

            <div class="sub-section-title title-morning">
                <i class="fa-solid fa-sun"></i>
                【早上】指標
            </div>

            <div class="input-group" style="grid-column:span 2;">
                <label>早上血壓</label>
                <input type="text" id="morningBP" class="form-control" placeholder="112/79">
            </div>

            <div class="input-group" style="grid-column:span 2;">
                <label>早上心跳</label>
                <input type="text" id="morningHR" class="form-control" placeholder="84">
            </div>

            <div class="input-group" style="grid-column:span 2;">
                <label>早上血氧/心跳</label>
                <input type="text" id="morningBO" class="form-control" placeholder="97/75">
            </div>

            <div class="sub-section-title title-evening">
                <i class="fa-solid fa-moon"></i>
                【晚上】指標
            </div>

            <div class="input-group" style="grid-column:span 2;">
                <label>晚上血壓</label>
                <input type="text" id="eveningBP" class="form-control" placeholder="131/76">
            </div>

            <div class="input-group" style="grid-column:span 2;">
                <label>晚上心跳</label>
                <input type="text" id="eveningHR" class="form-control" placeholder="99">
            </div>

            <div class="input-group" style="grid-column:span 2;">
                <label>晚上血氧/心跳</label>
                <input type="text" id="eveningBO" class="form-control" placeholder="96/95">
            </div>

            <div class="input-group" style="grid-column:span 6;">
                <label>症狀與服藥備註</label>
                <input type="text" id="manualSymptom" class="form-control" placeholder="特殊狀況備註...">
            </div>

            <div class="btn-submit-container">
                <button class="btn-ai" onclick="handleDataSubmission()">
                    <i class="fa-solid fa-plus"></i>
                    確認新增至暫存表
                </button>
            </div>

        </div>

    </div>

</div>

<!-- 工具列 -->

<div class="toolbar">

    <div style="font-size:16px;font-weight:700;">
        <i class="fa-solid fa-table-list"></i>
        03 當機紀錄異動台 (本地暫存)
    </div>

    <div class="filter-container">

        <div class="select-box-wrapper">

            <label>看成員:</label>

            <select id="userFilter" class="filter-select" onchange="renderTable()">
                <option value="全部">全部成員</option>
                <option value="妃">妃</option>
                <option value="爸爸">爸爸</option>
                <option value="媽媽">媽媽</option>
                <option value="通">通</option>
            </select>

        </div>

    </div>

</div>

<!-- 表格 -->

<div class="table-card">

<div class="table-responsive">

<table>

<thead>

<tr>

<th rowspan="2" style="width:140px;">日期</th>
<th rowspan="2" style="width:90px;">對象</th>

<th colspan="4">【早上】紀錄</th>
<th colspan="4">【晚上】紀錄</th>

<th rowspan="2" style="width:90px;">體重</th>
<th rowspan="2" style="width:70px;">排便</th>
<th rowspan="2">症狀與服藥備註</th>
<th rowspan="2" style="width:60px;">操作</th>

</tr>

<tr>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>
</div>

<div class="tip-text">
<i class="fa-solid fa-circle-info"></i>
提示：新增後資料會存在本地與 Google Sheet 雙重備份。
</div>

</div>

<script>

const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

document.getElementById('targetDate').valueAsDate = new Date();

let healthData = JSON.parse(localStorage.getItem('family_health_data')) || [];

function saveDataToLocal(){
    localStorage.setItem('family_health_data', JSON.stringify(healthData));
}

function calculatePulseDifference(bpString){

    if(!bpString || !bpString.includes('/')){
        return {
            value:"—",
            className:""
        };
    }

    const parts = bpString.split('/');
    const diff = parseInt(parts[0]) - parseInt(parts[1]);

    if(isNaN(diff)){
        return {
            value:"—",
            className:""
        };
    }

    return {
        value:diff,
        className:diff > 60 ? "value-warning" : ""
    };
}

function getHeartRateClass(hrString){

    return parseInt(hrString) > 100
        ? "value-warning"
        : "";
}

function handleDataSubmission(){

    const formattedDate = document.getElementById('targetDate').value.replace(/-/g,'/');

    if(!formattedDate){
        alert("請選擇日期");
        return;
    }

    const userInput = document.getElementById('targetUser').value;

    const newData = {

        date:formattedDate,
        user:userInput,

        mBP:document.getElementById('morningBP').value.trim(),
        mHR:document.getElementById('morningHR').value.trim(),
        mBO:document.getElementById('morningBO').value.trim(),

        eBP:document.getElementById('eveningBP').value.trim(),
        eHR:document.getElementById('eveningHR').value.trim(),
        eBO:document.getElementById('eveningBO').value.trim(),

        weight:document.getElementById('manualWeight').value.trim(),

        poop:document.getElementById('manualPoop').checked,

        symptom:document.getElementById('manualSymptom').value.trim()

    };

    const matchIndex = healthData.findIndex(item =>
        item.date === formattedDate &&
        item.user === userInput
    );

    if(matchIndex !== -1){

        healthData[matchIndex] = newData;

    }else{

        healthData.unshift(newData);

    }

    saveDataToLocal();

    clearInputs();

    renderTable();
}

function clearInputs(){

    document.getElementById('aiInput').value = "";

    document.getElementById('morningBP').value = "";
    document.getElementById('morningHR').value = "";
    document.getElementById('morningBO').value = "";

    document.getElementById('eveningBP').value = "";
    document.getElementById('eveningHR').value = "";
    document.getElementById('eveningBO').value = "";

    document.getElementById('manualWeight').value = "";
    document.getElementById('manualPoop').checked = false;
    document.getElementById('manualSymptom').value = "";
}

function syncWithGoogleSheet(){

    if(GOOGLE_WEB_APP_URL.includes("請貼上")){
        alert("請先貼上 Apps Script Web App 網址");
        return;
    }

    const spinner = document.getElementById('loadingTxt');

    spinner.style.display = "inline-block";

    fetch(GOOGLE_WEB_APP_URL,{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify(healthData)

    })

    .then(response => response.json())

    .then(data => {

        spinner.style.display = "none";

        if(data.success){

            alert("🎉 同步成功");

        }else{

            alert("❌ 同步失敗");

        }

    })

    .catch(err => {

        spinner.style.display = "none";

        console.error(err);

        alert("❌ 同步失敗");

    });

}

function deleteRow(index){

    if(confirm("確定刪除？")){

        healthData.splice(index,1);

        saveDataToLocal();

        renderTable();
    }
}

function updateField(index, field, value){

    healthData[index][field] = value;

    saveDataToLocal();

    renderTable();
}

function renderTable(){

    const tableBody = document.getElementById('tableBody');

    tableBody.innerHTML = "";

    healthData.sort((a,b) => new Date(b.date) - new Date(a.date));

    healthData.forEach((item,index)=>{

        const mPulse = calculatePulseDifference(item.mBP);
        const ePulse = calculatePulseDifference(item.eBP);

        const tr = document.createElement('tr');

        tr.innerHTML = `

<td>
<input type="date"
class="editable-cell"
value="${item.date.replace(/\//g,'-')}"
onchange="updateField(${index},'date',this.value.replace(/-/g,'/'))">
</td>

<td>

<select class="editable-cell"
onchange="updateField(${index},'user',this.value)">

<option value="妃" ${item.user==='妃'?'selected':''}>妃</option>
<option value="爸爸" ${item.user==='爸爸'?'selected':''}>爸爸</option>
<option value="媽媽" ${item.user==='媽媽'?'selected':''}>媽媽</option>
<option value="通" ${item.user==='通'?'selected':''}>通</option>

</select>

</td>

<td class="morning-col">
<input type="text" class="editable-cell"
value="${item.mBP || ''}"
onchange="updateField(${index},'mBP',this.value)">
</td>

<td class="morning-col ${mPulse.className}">
${mPulse.value}
</td>

<td class="morning-col">
<input type="text"
class="editable-cell ${getHeartRateClass(item.mHR)}"
value="${item.mHR || ''}"
onchange="updateField(${index},'mHR',this.value)">
</td>

<td class="morning-col">
<input type="text"
class="editable-cell"
value="${item.mBO || ''}"
onchange="updateField(${index},'mBO',this.value)">
</td>

<td class="evening-col">
<input type="text"
class="editable-cell"
value="${item.eBP || ''}"
onchange="updateField(${index},'eBP',this.value)">
</td>

<td class="evening-col ${ePulse.className}">
${ePulse.value}
</td>

<td class="evening-col">
<input type="text"
class="editable-cell ${getHeartRateClass(item.eHR)}"
value="${item.eHR || ''}"
onchange="updateField(${index},'eHR',this.value)">
</td>

<td class="evening-col">
<input type="text"
class="editable-cell"
value="${item.eBO || ''}"
onchange="updateField(${index},'eBO',this.value)">
</td>

<td>
<input type="text"
class="editable-cell"
value="${item.weight || ''}"
onchange="updateField(${index},'weight',this.value)">
</td>

<td>
<input type="checkbox"
class="poop-checkbox"
${item.poop ? 'checked':''}
onchange="updateField(${index},'poop',this.checked)">
</td>

<td>
<input type="text"
class="editable-cell symptom-input"
value="${item.symptom || ''}"
placeholder="修改備註..."
onchange="updateField(${index},'symptom',this.value)">
</td>

<td>
<button class="btn-delete-row" onclick="deleteRow(${index})">
<i class="fa-regular fa-trash-can"></i>
</button>
</td>

`;

        tableBody.appendChild(tr);

    });
}

renderTable();

</script>

</body>
</html>
