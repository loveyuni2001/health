```html
<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>全家人健康智慧導航站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
    --bg:#F5F4F0;
    --black:#111111;
    --white:#FFFFFF;
    --sub:#777;
    --blue:#E8F0FE;
    --yellow:#FDF7E7;
    --danger:#D93025;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family:'Inter','Noto Sans TC',sans-serif;
    color:var(--black);
}

.container{
    max-width:1400px;
    margin:auto;
    padding:15px;
}

.portal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:3px solid var(--black);
    padding-bottom:12px;
    margin-bottom:20px;
    gap:10px;
    flex-wrap:wrap;
}

.portal-header h1{
    margin:0;
    font-size:24px;
}

.portal-header p{
    margin:3px 0 0 0;
    font-size:12px;
    color:var(--sub);
}

.btn-sync{
    background:#188038;
    color:#fff;
    border:none;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:700;
}

.double-entry-wrapper{
    display:grid;
    grid-template-columns:1fr 1.3fr;
    gap:20px;
    margin-bottom:25px;
}

@media(max-width:900px){

    .double-entry-wrapper{
        grid-template-columns:1fr;
    }

}

.entry-card{
    background:#fff;
    border:2px solid var(--black);
    border-radius:16px;
    padding:20px;
}

.box-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:15px;
}

.ai-textarea{
    width:100%;
    min-height:180px;
    resize:none;
    border:2px solid var(--black);
    border-radius:12px;
    padding:12px;
    font-size:14px;
    background:#FAFAFA;
}

.right-form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
}

@media(max-width:768px){

    .right-form-grid{
        grid-template-columns:repeat(2,1fr);
    }

}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
}

.form-control{
    width:100%;
    height:42px;
    border:2px solid var(--black);
    border-radius:12px;
    padding:8px 10px;
    font-size:14px;
}

.form-control::placeholder{
    color:#BBBBBB;
}

.sub-title{
    grid-column:span 6;
    padding:8px;
    border-radius:8px;
    font-weight:700;
}

@media(max-width:768px){

    .sub-title{
        grid-column:span 2;
    }

}

.morning{
    background:var(--blue);
}

.evening{
    background:var(--yellow);
}

.btn-add{
    grid-column:span 6;
    height:46px;
    border:none;
    border-radius:12px;
    background:var(--black);
    color:#fff;
    font-weight:700;
    cursor:pointer;
}

@media(max-width:768px){

    .btn-add{
        grid-column:span 2;
    }

}

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:20px 0;
    flex-wrap:wrap;
    gap:10px;
}

.filter-wrap{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.table-card{
    background:#fff;
    border:2px solid var(--black);
    border-radius:16px;
    overflow:hidden;
}

.table-responsive{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1200px;
    border-collapse:collapse;
}

th{
    background:#111;
    color:#fff;
    padding:10px 8px;
    border-right:2px solid #333;
    font-size:14px;
}

td{
    border-right:2px solid #EAEAEA;
    border-bottom:2px solid #EAEAEA;
    padding:8px;
    text-align:center;
    background:#fff;
}

.morning-col{
    background:var(--blue);
}

.evening-col{
    background:var(--yellow);
}

.editable-cell{
    width:100%;
    border:none;
    background:transparent;
    text-align:center;
    font-size:14px;
    padding:5px;
}

.editable-cell:focus{
    outline:2px solid #111;
    border-radius:6px;
    background:#fff;
}

.value-warning{
    background:rgba(217,48,37,0.15);
    color:var(--danger);
    font-weight:700;
    border-radius:6px;
}

.symptom-input{
    text-align:left;
}

.poop-checkbox{
    width:18px;
    height:18px;
}

.btn-delete{
    border:none;
    background:none;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<div class="portal-header">

<div>
<h1>全家人健康智慧導航站</h1>
<p>Family Health Intelligence Cloud Portal</p>
</div>

<button class="btn-sync" onclick="syncWithGoogleSheet()">
同步 Google Sheet
</button>

</div>

<div class="double-entry-wrapper">

<div class="entry-card">

<div class="box-title">
LINE 文字解析
</div>

<textarea
id="aiInput"
class="ai-textarea"
placeholder="貼上 LINE 文字"
></textarea>

</div>

<div class="entry-card">

<div class="box-title">
基礎設定與健康指標填寫
</div>

<div class="right-form-grid">

<div class="input-group" style="grid-column:span 2;">
<label>日期</label>
<input type="date" id="targetDate" class="form-control">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>對象</label>
<select id="targetUser" class="form-control">
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="input-group" style="grid-column:span 2;">
<label>體重</label>
<input type="text" id="manualWeight" class="form-control" placeholder="57.7">
</div>

<div class="sub-title morning">
【早上】指標
</div>

<div class="input-group" style="grid-column:span 2;">
<label>早上血壓</label>
<input type="text" id="morningBP" class="form-control" placeholder="112/79">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>早上心跳</label>
<input type="text" id="morningHR" class="form-control" placeholder="84">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>早上血氧/心跳</label>
<input type="text" id="morningBO" class="form-control" placeholder="97/75">
</div>

<div class="sub-title evening">
【晚上】指標
</div>

<div class="input-group" style="grid-column:span 2;">
<label>晚上血壓</label>
<input type="text" id="eveningBP" class="form-control" placeholder="128/79">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>晚上心跳</label>
<input type="text" id="eveningHR" class="form-control" placeholder="92">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>晚上血氧/心跳</label>
<input type="text" id="eveningBO" class="form-control" placeholder="96/90">
</div>

<div class="input-group" style="grid-column:span 6;">
<label>症狀與服藥備註</label>
<input type="text" id="manualSymptom" class="form-control" placeholder="特殊狀況">
</div>

<div class="input-group">
<label>排便</label>
<input type="checkbox" id="manualPoop" class="poop-checkbox">
</div>

<button class="btn-add" onclick="handleDataSubmission()">
確認新增至暫存表
</button>

</div>

</div>

</div>

<div class="toolbar">

<div class="filter-wrap">

<select id="userFilter" class="form-control" onchange="renderTable()">
<option value="全部">全部成員</option>
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>

<select id="monthFilter" class="form-control" onchange="renderTable()">
<option value="全部">全部月份</option>
<option value="2026/05">2026/05</option>
<option value="2026/06">2026/06</option>
</select>

</div>

</div>

<div class="table-card">

<div class="table-responsive">

<table>

<thead>

<tr>

<th rowspan="2">日期</th>
<th rowspan="2">對象</th>

<th colspan="4">【早上】紀錄</th>

<th colspan="4">【晚上】紀錄</th>

<th rowspan="2">體重</th>
<th rowspan="2">排便</th>
<th rowspan="2">症狀與服藥備註</th>
<th rowspan="2">操作</th>

</tr>

<tr>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<script>

const GOOGLE_WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

document.getElementById('targetDate').valueAsDate = new Date();

let healthData =
JSON.parse(localStorage.getItem('family_health_data')) || [];

function saveDataToLocal(){

    localStorage.setItem(
        'family_health_data',
        JSON.stringify(healthData)
    );

}

function parseBlock(block){

    const result = {
        bp:"",
        hr:"",
        bo:""
    };

    const lines = block
        .split(/\n|\r/)
        .map(v=>v.trim())
        .filter(v=>v!=='');

    lines.forEach(line=>{

        const bpHr =
        line.match(/^(\d{2,3})-(\d{2,3})-(\d{2,3})$/);

        if(bpHr){

            result.bp =
            `${bpHr[1]}/${bpHr[2]}`;

            result.hr =
            bpHr[3];

        }

        const bo =
        line.match(/^(\d{2,3})-(\d{2,3})$/);

        if(bo && !bpHr){

            result.bo =
            `${bo[1]}/${bo[2]}`;

        }

    });

    return result;

}

function calculatePulseDifference(bp){

    if(!bp || !bp.includes('/')){

        return {
            value:'—',
            className:''
        };

    }

    const parts = bp.split('/');

    const high = parseInt(parts[0]);
    const low = parseInt(parts[1]);

    if(isNaN(high)||isNaN(low)){

        return {
            value:'—',
            className:''
        };

    }

    const diff = high-low;

    return {
        value:diff,
        className:diff>60?'value-warning':''
    };

}

function getHeartRateClass(hr){

    return parseInt(hr)>100
        ? 'value-warning'
        : '';

}

function handleDataSubmission(){

    const text =
    document.getElementById('aiInput').value;

    const formattedDate =
    document.getElementById('targetDate')
    .value
    .replace(/-/g,'/');

    const user =
    document.getElementById('targetUser').value;

    let tempRecord = {

        mBP:
        document.getElementById('morningBP').value,

        mHR:
        document.getElementById('morningHR').value,

        mBO:
        document.getElementById('morningBO').value,

        eBP:
        document.getElementById('eveningBP').value,

        eHR:
        document.getElementById('eveningHR').value,

        eBO:
        document.getElementById('eveningBO').value,

        weight:
        document.getElementById('manualWeight').value,

        poop:
        document.getElementById('manualPoop').checked,

        symptom:
        document.getElementById('manualSymptom').value

    };

    if(text.trim()!==''){

        const eveningIndex =
        text.search(/[晚夜]/);

        let morningBlock = '';
        let eveningBlock = '';

        if(eveningIndex!==-1){

            morningBlock =
            text.substring(0,eveningIndex);

            eveningBlock =
            text.substring(eveningIndex);

        }else{

            morningBlock = text;

        }

        const mObj =
        parseBlock(morningBlock);

        tempRecord.mBP = mObj.bp;
        tempRecord.mHR = mObj.hr;
        tempRecord.mBO = mObj.bo;

        if(eveningBlock){

            const eObj =
            parseBlock(eveningBlock);

            tempRecord.eBP = eObj.bp;
            tempRecord.eHR = eObj.hr;
            tempRecord.eBO = eObj.bo;

        }

    }

    const matchIndex =
    healthData.findIndex(d=>

        d.date===formattedDate &&
        d.user===user

    );

    if(matchIndex!==-1){

        healthData[matchIndex] = {
            ...healthData[matchIndex],
            ...tempRecord
        };

    }else{

        healthData.unshift({

            date:formattedDate,
            user:user,
            ...tempRecord

        });

    }

    saveDataToLocal();

    renderTable();

}

function updateField(index,field,value){

    if(field==='date'){

        value =
        value.replace(/-/g,'/');

    }

    healthData[index][field]=value;

    saveDataToLocal();

    renderTable();

}

function deleteRow(index){

    healthData.splice(index,1);

    saveDataToLocal();

    renderTable();

}

function renderTable(){

    const tableBody =
    document.getElementById('tableBody');

    tableBody.innerHTML='';

    const filterUser =
    document.getElementById('userFilter').value;

    const filterMonth =
    document.getElementById('monthFilter').value;

    healthData.forEach((item,index)=>{

        if(
            filterUser!=='全部' &&
            item.user!==filterUser
        ){
            return;
        }

        if(
            filterMonth!=='全部' &&
            !item.date.startsWith(filterMonth)
        ){
            return;
        }

        const mPulse =
        calculatePulseDifference(item.mBP);

        const ePulse =
        calculatePulseDifference(item.eBP);

        const tr =
        document.createElement('tr');

        tr.innerHTML = `

<td>
<input
type="date"
class="editable-cell"
value="${item.date.replace(/\//g,'-')}"
onchange="updateField(${index},'date',this.value)"
>
</td>

<td>

<select
class="editable-cell"
onchange="updateField(${index},'user',this.value)"
>

<option value="妃" ${item.user==='妃'?'selected':''}>妃</option>
<option value="爸爸" ${item.user==='爸爸'?'selected':''}>爸爸</option>
<option value="媽媽" ${item.user==='媽媽'?'selected':''}>媽媽</option>
<option value="通" ${item.user==='通'?'selected':''}>通</option>

</select>

</td>

<td class="morning-col">
<input
type="text"
class="editable-cell"
value="${item.mBP||''}"
onchange="updateField(${index},'mBP',this.value)"
>
</td>

<td class="morning-col ${mPulse.className}">
${mPulse.value}
</td>

<td class="morning-col">

<input
type="text"
class="editable-cell ${getHeartRateClass(item.mHR)}"
value="${item.mHR||''}"
onchange="updateField(${index},'mHR',this.value)"
>

</td>

<td class="morning-col">

<input
type="text"
class="editable-cell"
value="${item.mBO||''}"
onchange="updateField(${index},'mBO',this.value)"
>

</td>

<td class="evening-col">

<input
type="text"
class="editable-cell"
value="${item.eBP||''}"
onchange="updateField(${index},'eBP',this.value)"
>

</td>

<td class="evening-col ${ePulse.className}">
${ePulse.value}
</td>

<td class="evening-col">

<input
type="text"
class="editable-cell ${getHeartRateClass(item.eHR)}"
value="${item.eHR||''}"
onchange="updateField(${index},'eHR',this.value)"
>

</td>

<td class="evening-col">

<input
type="text"
class="editable-cell"
value="${item.eBO||''}"
onchange="updateField(${index},'eBO',this.value)"
>

</td>

<td>

<input
type="text"
class="editable-cell"
value="${item.weight||''}"
onchange="updateField(${index},'weight',this.value)"
>

</td>

<td>

<input
type="checkbox"
class="poop-checkbox"
${item.poop?'checked':''}
onchange="updateField(${index},'poop',this.checked)"
>

</td>

<td>

<input
type="text"
class="editable-cell symptom-input"
value="${item.symptom||''}"
onchange="updateField(${index},'symptom',this.value)"
>

</td>

<td>

<button
class="btn-delete"
onclick="deleteRow(${index})"
>
🗑
</button>

</td>

`;

        tableBody.appendChild(tr);

    });

}

function syncWithGoogleSheet(){

    fetch(GOOGLE_WEB_APP_URL,{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify(healthData)

    })

    .then(()=>{

        alert('同步成功');

    })

    .catch(err=>{

        console.error(err);

        alert('同步失敗');

    });

}

renderTable();

</script>

</body>
</html>
```
