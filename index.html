<!DOCTYPE html>
<html lang="zh-TW">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>全家人健康智慧導航站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg:#F5F4F0;
    --black:#111111;
    --white:#FFFFFF;
    --sub:#5F6368;
    --danger:#D93025;
    --green:#188038;
    --morning:#E8F0FE;
    --evening:#FDF7E7;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family:'Inter','Noto Sans TC',sans-serif;
    color:var(--black);
}

.container{
    width:100%;
    max-width:1400px;
    margin:auto;
    padding:15px;
}

/* HEADER */

.portal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:20px;
    border-bottom:3px solid var(--black);
    padding-bottom:14px;
}

.title-group h1{
    margin:0;
    font-size:24px;
    font-weight:700;
}

.title-group p{
    margin:4px 0 0 0;
    font-size:12px;
    color:var(--sub);
    font-weight:700;
}

.sync-btn-container{
    display:flex;
    align-items:center;
    gap:10px;
}

.btn-sync-cloud{
    border:none;
    background:var(--green);
    color:#fff;
    padding:10px 16px;
    border-radius:999px;
    font-weight:700;
    cursor:pointer;
    border:2px solid var(--black);
    box-shadow:0 3px 0 var(--black);
}

.loading-spinner{
    display:none;
    color:var(--green);
    font-size:13px;
    font-weight:700;
}

/* TOP GRID */

.double-entry-wrapper{
    display:grid;
    grid-template-columns:1fr 1.2fr;
    gap:20px;
    margin-bottom:25px;
}

@media(max-width:900px){

    .double-entry-wrapper{
        grid-template-columns:1fr;
    }

}

/* CARD */

.entry-card{
    background:var(--white);
    border:2px solid var(--black);
    border-radius:18px;
    padding:20px;
    position:relative;
}

.step-label{
    position:absolute;
    top:-12px;
    left:20px;
    background:var(--black);
    color:#fff;
    font-size:11px;
    padding:4px 12px;
    border-radius:999px;
    font-weight:700;
}

.box-title{
    margin-top:6px;
    margin-bottom:16px;
    font-size:16px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
}

/* TEXTAREA */

.ai-textarea{
    width:100%;
    min-height:170px;
    resize:none;
    border:2px solid var(--black);
    border-radius:14px;
    padding:12px;
    font-size:14px;
    outline:none;
    background:#FAFAFA;
}

/* FORM */

.right-form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
}

@media(max-width:768px){

    .right-form-grid{
        grid-template-columns:repeat(2,1fr);
    }

}

.input-group{
    display:flex;
    flex-direction:column;
    gap:5px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
}

.form-control{
    width:100%;
    height:42px;
    border:2px solid var(--black);
    border-radius:12px;
    padding:8px 10px;
    font-size:14px;
    font-weight:600;
    outline:none;
    background:#fff;
}

.sub-section-title{
    grid-column:span 6;
    padding:8px;
    border-radius:8px;
    font-size:13px;
    font-weight:700;
}

.title-morning{
    background:var(--morning);
    color:#1A73E8;
}

.title-evening{
    background:var(--evening);
    color:#B06000;
}

@media(max-width:768px){

    .sub-section-title{
        grid-column:span 2;
    }

}

.poop-switch-container{
    height:42px;
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid var(--black);
    border-radius:12px;
    background:#fff;
}

.main-checkbox{
    width:18px;
    height:18px;
}

.btn-submit-container{
    grid-column:span 6;
}

@media(max-width:768px){

    .btn-submit-container{
        grid-column:span 2;
    }

}

.btn-ai{
    width:100%;
    border:none;
    background:var(--black);
    color:#fff;
    border-radius:12px;
    padding:13px;
    font-weight:700;
    cursor:pointer;
}

/* TOOLBAR */

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
    border-top:3px solid var(--black);
    padding-top:15px;
}

.filter-container{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.select-box-wrapper{
    border:2px solid var(--black);
    border-radius:999px;
    padding:5px 12px;
    background:#fff;
}

.filter-select{
    border:none;
    background:transparent;
    font-weight:700;
    outline:none;
}

/* TABLE */

.table-card{
    background:#fff;
    border:2px solid var(--black);
    border-radius:18px;
    overflow:hidden;
}

.table-responsive{
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1300px;
    border-collapse:separate;
    border-spacing:0;
    text-align:center;
}

th{
    background:var(--black);
    color:#fff;
    padding:12px 8px;
    font-size:13px;
    border-right:1px solid #444;
}

td{
    background:#fff;
    padding:8px;
    border-right:1px solid #EAEAEA;
    border-bottom:1px solid #EAEAEA;
}

.morning-col{
    background:var(--morning);
}

.evening-col{
    background:var(--evening);
}

.editable-cell{
    width:100%;
    border:2px solid transparent;
    border-radius:8px;
    padding:5px;
    background:transparent;
    text-align:center;
    font-weight:700;
    outline:none;
}

.editable-cell:focus{
    border:2px solid var(--black);
    background:#fff;
}

.symptom-input{
    text-align:left;
}

.poop-checkbox{
    width:18px;
    height:18px;
}

.value-warning{
    color:var(--danger) !important;
    font-weight:800 !important;
    background:rgba(217,48,37,.12);
    border-radius:6px;
}

.btn-delete-row{
    border:none;
    background:transparent;
    cursor:pointer;
    color:#777;
}

.btn-delete-row:hover{
    color:var(--danger);
}

.tip-text{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:var(--sub);
    font-weight:700;
}

</style>

</head>

<body>

<div class="container">

<div class="portal-header">

    <div class="title-group">
        <h1>全家人健康智慧導航站</h1>
        <p>Family Health Intelligence Cloud Portal</p>
    </div>

    <div class="sync-btn-container">

        <span id="loadingTxt" class="loading-spinner">
            <i class="fa-solid fa-spinner fa-spin"></i>
            雲端同步中...
        </span>

        <button class="btn-sync-cloud" onclick="syncWithGoogleSheet()">
            <i class="fa-solid fa-cloud-arrow-up"></i>
            同步至 Google Sheet 備份
        </button>

    </div>

</div>

<div class="double-entry-wrapper">

<div class="entry-card">

<div class="step-label">01 智慧解析</div>

<div class="box-title">
<i class="fa-solid fa-wand-magic-sparkles"></i>
LINE 文字全解析
</div>

<textarea id="aiInput" class="ai-textarea" placeholder="在此貼上 LINE 辨識文字..."></textarea>

</div>

<div class="entry-card">

<div class="step-label">02 手動紀錄 / 微調區</div>

<div class="box-title">
<i class="fa-solid fa-keyboard"></i>
基礎設定與健康指標填寫
</div>

<div class="right-form-grid">

<div class="input-group" style="grid-column:span 2;">
<label>設定日期</label>
<input type="date" id="targetDate" class="form-control">
</div>

<div class="input-group">
<label>記錄對象</label>
<select id="targetUser" class="form-control">
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>
</select>
</div>

<div class="input-group">
<label>體重</label>
<input type="text" id="manualWeight" class="form-control" placeholder="57.7">
</div>

<div class="input-group">
<label>排便</label>

<div class="poop-switch-container">
<input type="checkbox" id="manualPoop" class="main-checkbox">
</div>

</div>

<div class="sub-section-title title-morning">
<i class="fa-solid fa-sun"></i>
【早上】指標
</div>

<div class="input-group">
<label>早上血壓</label>
<input type="text" id="morningBP" class="form-control" placeholder="112/79">
</div>

<div class="input-group">
<label>早上心跳</label>
<input type="text" id="morningHR" class="form-control" placeholder="84">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>早上血氧/心跳</label>
<input type="text" id="morningBO" class="form-control" placeholder="97/75">
</div>

<div class="sub-section-title title-evening">
<i class="fa-solid fa-moon"></i>
【晚上】指標
</div>

<div class="input-group">
<label>晚上血壓</label>
<input type="text" id="eveningBP" class="form-control" placeholder="131/76">
</div>

<div class="input-group">
<label>晚上心跳</label>
<input type="text" id="eveningHR" class="form-control" placeholder="99">
</div>

<div class="input-group" style="grid-column:span 2;">
<label>晚上血氧/心跳</label>
<input type="text" id="eveningBO" class="form-control" placeholder="96/95">
</div>

<div class="input-group" style="grid-column:span 6;">

<label>症狀與服藥備註</label>

<input type="text" id="manualSymptom" class="form-control" placeholder="特殊狀況備註...">

</div>

<div class="btn-submit-container">

<button class="btn-ai" onclick="handleDataSubmission()">
<i class="fa-solid fa-plus"></i>
確認新增至暫存表
</button>

</div>

</div>

</div>

</div>

<div class="toolbar">

<div style="font-size:16px;font-weight:700;">
<i class="fa-solid fa-table-list"></i>
03 當機紀錄異動台
</div>

<div class="filter-container">

<div class="select-box-wrapper">

<label>看成員：</label>

<select id="userFilter" class="filter-select" onchange="renderTable()">

<option value="全部">全部</option>
<option value="妃">妃</option>
<option value="爸爸">爸爸</option>
<option value="媽媽">媽媽</option>
<option value="通">通</option>

</select>

</div>

<div class="select-box-wrapper">

<label>月份：</label>

<select id="monthFilter" class="filter-select" onchange="renderTable()">

<option value="全部">全部</option>

</select>

</div>

</div>

</div>

<div class="table-card">

<div class="table-responsive">

<table>

<thead>

<tr>

<th rowspan="2">日期</th>
<th rowspan="2">對象</th>

<th colspan="4">【早上】紀錄</th>
<th colspan="4">【晚上】紀錄</th>

<th rowspan="2">體重</th>
<th rowspan="2">排便</th>
<th rowspan="2">症狀與服藥備註</th>
<th rowspan="2">操作</th>

</tr>

<tr>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧/心跳</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<div class="tip-text">
<i class="fa-solid fa-circle-info"></i>
資料會存在本地與 Google Sheet
</div>

</div>

<script>

const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

document.getElementById('targetDate').valueAsDate = new Date();

let healthData = JSON.parse(localStorage.getItem('family_health_data')) || [];

function saveData(){
    localStorage.setItem('family_health_data',JSON.stringify(healthData));
}

function calculatePulse(bp){

    if(!bp || !bp.includes('/')){
        return {
            value:'—',
            className:''
        };
    }

    const parts = bp.split('/');

    const diff = parseInt(parts[0]) - parseInt(parts[1]);

    return {
        value:diff,
        className: diff > 60 ? 'value-warning' : ''
    };

}

function getHeartClass(hr){

    return parseInt(hr) > 100 ? 'value-warning' : '';

}

function handleDataSubmission(){

    const date = document.getElementById('targetDate').value.replaceAll('-','/');
    const user = document.getElementById('targetUser').value;

    const newData = {

        date:date,
        user:user,

        mBP:document.getElementById('morningBP').value,
        mHR:document.getElementById('morningHR').value,
        mBO:document.getElementById('morningBO').value,

        eBP:document.getElementById('eveningBP').value,
        eHR:document.getElementById('eveningHR').value,
        eBO:document.getElementById('eveningBO').value,

        weight:document.getElementById('manualWeight').value,

        poop:document.getElementById('manualPoop').checked,

        symptom:document.getElementById('manualSymptom').value

    };

    const existIndex = healthData.findIndex(x=>x.date===date && x.user===user);

    if(existIndex !== -1){

        healthData[existIndex] = newData;

    }else{

        healthData.unshift(newData);

    }

    saveData();

    renderTable();

}

function renderMonthOptions(){

    const select = document.getElementById('monthFilter');

    const months = [...new Set(
        healthData.map(x=>x.date.substring(0,7))
    )];

    select.innerHTML = `<option value="全部">全部</option>`;

    months.sort().reverse().forEach(m=>{

        select.innerHTML += `<option value="${m}">${m}</option>`;

    });

}

function renderTable(){

    renderMonthOptions();

    const body = document.getElementById('tableBody');

    body.innerHTML = '';

    const userFilter = document.getElementById('userFilter').value;
    const monthFilter = document.getElementById('monthFilter').value;

    healthData.sort((a,b)=> new Date(b.date)-new Date(a.date));

    healthData.forEach((item,index)=>{

        if(userFilter !== '全部' && item.user !== userFilter){
            return;
        }

        if(monthFilter !== '全部' && !item.date.startsWith(monthFilter)){
            return;
        }

        const mPulse = calculatePulse(item.mBP);
        const ePulse = calculatePulse(item.eBP);

        const tr = document.createElement('tr');

        tr.innerHTML = `

        <td>${item.date}</td>

        <td>${item.user}</td>

        <td class="morning-col">${item.mBP || ''}</td>

        <td class="morning-col ${mPulse.className}">
            ${mPulse.value}
        </td>

        <td class="morning-col ${getHeartClass(item.mHR)}">
            ${item.mHR || ''}
        </td>

        <td class="morning-col">
            ${item.mBO || ''}
        </td>

        <td class="evening-col">
            ${item.eBP || ''}
        </td>

        <td class="evening-col ${ePulse.className}">
            ${ePulse.value}
        </td>

        <td class="evening-col ${getHeartClass(item.eHR)}">
            ${item.eHR || ''}
        </td>

        <td class="evening-col">
            ${item.eBO || ''}
        </td>

        <td>
            ${item.weight || ''}
        </td>

        <td>
            <input type="checkbox" class="poop-checkbox" ${item.poop ? 'checked' : ''} disabled>
        </td>

        <td style="text-align:left;">
            ${item.symptom || ''}
        </td>

        <td>

            <button class="btn-delete-row" onclick="deleteRow(${index})">
                <i class="fa-regular fa-trash-can"></i>
            </button>

        </td>

        `;

        body.appendChild(tr);

    });

}

function deleteRow(index){

    if(confirm('確定刪除？')){

        healthData.splice(index,1);

        saveData();

        renderTable();

    }

}

async function syncWithGoogleSheet(){

    if(healthData.length === 0){

        alert('沒有資料');

        return;

    }

    const spinner = document.getElementById('loadingTxt');

    spinner.style.display = 'inline-block';

    try{

        const response = await fetch(GOOGLE_WEB_APP_URL,{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify(healthData)

        });

        const result = await response.json();

        spinner.style.display = 'none';

        if(result.success){

            alert('同步成功');

        }else{

            alert('同步失敗');

            console.log(result);

        }

    }catch(err){

        spinner.style.display = 'none';

        console.error(err);

        alert('同步失敗');

    }

}

async function loadFromGoogleSheet(){

    try{

        const response = await fetch(GOOGLE_WEB_APP_URL);

        const data = await response.json();

        if(Array.isArray(data) && data.length > 0){

            healthData = data;

            saveData();

            renderTable();

        }

    }catch(err){

        console.log(err);

    }

}

renderTable();

loadFromGoogleSheet();

</script>

</body>
</html>
