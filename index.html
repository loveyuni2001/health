<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全家人健康智慧導航站</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Noto+Sans+TC:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
    --bg:#F5F4F0;
    --black:#111;
    --card:#fff;
    --sub:#666;
    --danger:#D93025;
    --green:#188038;
    --blue:#E8F0FE;
    --yellow:#FDF7E7;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:var(--bg);
    font-family:'Inter','Noto Sans TC',sans-serif;
    color:var(--black);
}

.container{
    width:100%;
    max-width:1700px;
    margin:auto;
    padding:14px;
}

/* Header */

.portal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    border-bottom:3px solid #111;
    padding-bottom:12px;
    margin-bottom:20px;
}

.portal-header h1{
    margin:0;
    font-size:28px;
}

.portal-header p{
    margin:4px 0 0;
    color:var(--sub);
    font-size:12px;
    font-weight:700;
}

.btn-sync{
    border:none;
    background:var(--green);
    color:#fff;
    border-radius:14px;
    padding:12px 18px;
    font-weight:700;
    cursor:pointer;
    font-size:14px;
}

/* 上方雙區塊 */

.double-wrapper{
    display:grid;
    grid-template-columns:1fr 1.2fr;
    gap:20px;
    margin-bottom:20px;
}

@media(max-width:1000px){
    .double-wrapper{
        grid-template-columns:1fr;
    }
}

.card{
    background:#fff;
    border-radius:18px;
    border:2px solid #111;
    padding:18px;
}

.box-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:16px;
}

textarea{
    width:100%;
    min-height:200px;
    border:2px solid #111;
    border-radius:14px;
    padding:12px;
    resize:none;
    font-size:15px;
}

.form-grid{
    display:grid;
    grid-template-columns:repeat(6,1fr);
    gap:10px;
}

@media(max-width:700px){
    .form-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:4px;
}

.input-group label{
    font-size:12px;
    font-weight:700;
}

.form-control{
    width:100%;
    height:42px;
    border:2px solid #111;
    border-radius:12px;
    padding:8px;
    font-size:14px;
}

.full{
    grid-column:span 6;
}

.half{
    grid-column:span 3;
}

.two{
    grid-column:span 2;
}

.one{
    grid-column:span 1;
}

@media(max-width:700px){

    .full,
    .half,
    .two{
        grid-column:span 2;
    }

    .one{
        grid-column:span 1;
    }
}

.section-title{
    grid-column:span 6;
    padding:8px 10px;
    border-radius:10px;
    font-weight:700;
    font-size:13px;
}

@media(max-width:700px){
    .section-title{
        grid-column:span 2;
    }
}

.morning{
    background:var(--blue);
}

.evening{
    background:var(--yellow);
}

.poop-box{
    height:42px;
    border:2px solid #111;
    border-radius:12px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.main-checkbox{
    width:20px;
    height:20px;
}

.btn-add{
    width:100%;
    border:none;
    background:#111;
    color:#fff;
    border-radius:14px;
    padding:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
}

/* 工具列 */

.toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:12px;
}

.filter-wrap{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.filter-box{
    background:#fff;
    border:2px solid #111;
    border-radius:999px;
    padding:6px 12px;
}

.filter-select{
    border:none;
    background:transparent;
    font-weight:700;
}

/* 表格 */

.table-card{
    background:#fff;
    border:2px solid #111;
    border-radius:18px;
    overflow:hidden;
}

.table-responsive{
    width:100%;
    overflow-x:auto;
}

table{
    width:100%;
    min-width:1450px;
    border-collapse:collapse;
}

th{
    background:#111;
    color:#fff;
    padding:12px 8px;
    font-size:13px;
}

td{
    border-bottom:1px solid #ddd;
    padding:6px;
    text-align:center;
}

.morning-col{
    background:var(--blue);
}

.evening-col{
    background:var(--yellow);
}

.editable{
    width:100%;
    border:none;
    background:transparent;
    text-align:center;
    padding:6px;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
}

.editable:focus{
    outline:none;
    background:#fff;
    border:2px solid #111;
}

.warning{
    color:var(--danger);
    font-weight:800;
    background:rgba(217,48,37,.15);
    border-radius:8px;
}

.poop-checkbox{
    width:20px;
    height:20px;
}

.delete-btn{
    border:none;
    background:none;
    cursor:pointer;
    font-size:16px;
}

.tip{
    margin-top:12px;
    text-align:center;
    color:#666;
    font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="portal-header">
    <div>
        <h1>全家人健康智慧導航站</h1>
        <p>Family Health Intelligence Cloud Portal</p>
    </div>

    <button class="btn-sync" onclick="syncWithGoogleSheet()">
        <i class="fa-solid fa-cloud-arrow-up"></i>
        同步 Google Sheet
    </button>
</div>

<div class="double-wrapper">

    <div class="card">

        <div class="box-title">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
            LINE 文字解析
        </div>

        <textarea id="aiInput"></textarea>

    </div>

    <div class="card">

        <div class="box-title">
            <i class="fa-solid fa-keyboard"></i>
            手動新增
        </div>

        <div class="form-grid">

            <div class="input-group two">
                <label>日期</label>
                <input type="date" id="targetDate" class="form-control">
            </div>

            <div class="input-group two">
                <label>對象</label>
                <select id="targetUser" class="form-control">
                    <option value="妃">妃</option>
                    <option value="爸爸">爸爸</option>
                    <option value="媽媽">媽媽</option>
                    <option value="通">通</option>
                </select>
            </div>

            <div class="input-group one">
                <label>體重</label>
                <input type="text" id="manualWeight" class="form-control">
            </div>

            <div class="input-group one">
                <label>排便</label>
                <div class="poop-box">
                    <input type="checkbox" id="manualPoop" class="main-checkbox">
                </div>
            </div>

            <div class="section-title morning">
                ☀️ 早上
            </div>

            <div class="input-group two">
                <label>血壓</label>
                <input type="text" id="morningBP" class="form-control">
            </div>

            <div class="input-group two">
                <label>心跳</label>
                <input type="text" id="morningHR" class="form-control">
            </div>

            <div class="input-group two">
                <label>血氧/心跳</label>
                <input type="text" id="morningBO" class="form-control">
            </div>

            <div class="section-title evening">
                🌙 晚上
            </div>

            <div class="input-group two">
                <label>血壓</label>
                <input type="text" id="eveningBP" class="form-control">
            </div>

            <div class="input-group two">
                <label>心跳</label>
                <input type="text" id="eveningHR" class="form-control">
            </div>

            <div class="input-group two">
                <label>血氧/心跳</label>
                <input type="text" id="eveningBO" class="form-control">
            </div>

            <div class="input-group full">
                <label>備註</label>
                <input type="text" id="manualSymptom" class="form-control">
            </div>

            <div class="full">
                <button class="btn-add" onclick="handleDataSubmission()">
                    新增資料
                </button>
            </div>

        </div>

    </div>

</div>

<div class="toolbar">

    <div style="font-weight:700;">
        健康紀錄表
    </div>

    <div class="filter-wrap">

        <div class="filter-box">
            成員：
            <select id="userFilter" class="filter-select" onchange="renderTable()">
                <option value="全部">全部</option>
                <option value="妃">妃</option>
                <option value="爸爸">爸爸</option>
                <option value="媽媽">媽媽</option>
                <option value="通">通</option>
            </select>
        </div>

        <div class="filter-box">
            月份：
            <select id="monthFilter" class="filter-select" onchange="renderTable()">
                <option value="全部">全部</option>
            </select>
        </div>

    </div>

</div>

<div class="table-card">

<div class="table-responsive">

<table>

<thead>

<tr>
<th rowspan="2">日期</th>
<th rowspan="2">對象</th>

<th colspan="4">早上</th>
<th colspan="4">晚上</th>

<th rowspan="2">體重</th>
<th rowspan="2">排便</th>
<th rowspan="2">備註</th>
<th rowspan="2">刪除</th>
</tr>

<tr>
<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧</th>

<th>血壓</th>
<th>脈壓差</th>
<th>心跳</th>
<th>血氧</th>
</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>
</div>

<div class="tip">
資料會先存在本地，再同步到 Google Sheet
</div>

</div>

<script>

const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz29A7pisPNFhFjVWXKAVwRNES--3hsRHyrGKvK2l2QiJ6eb653eGXrAszJ28azkdM-7g/exec";

document.getElementById('targetDate').valueAsDate = new Date();

let healthData = JSON.parse(localStorage.getItem('family_health_data')) || [];

function saveLocal(){
    localStorage.setItem('family_health_data', JSON.stringify(healthData));
}

function calculatePulse(bp){

    if(!bp || !bp.includes('/')){
        return {
            value:"-",
            warning:false
        };
    }

    let arr = bp.split('/');

    let diff = parseInt(arr[0]) - parseInt(arr[1]);

    return {
        value:diff,
        warning:diff > 60
    };
}

function hrWarning(hr){
    return parseInt(hr) > 100;
}

function handleDataSubmission(){

    const item = {

        date: document.getElementById('targetDate').value.replace(/-/g,'/'),
        user: document.getElementById('targetUser').value,

        mBP: document.getElementById('morningBP').value,
        mHR: document.getElementById('morningHR').value,
        mBO: document.getElementById('morningBO').value,

        eBP: document.getElementById('eveningBP').value,
        eHR: document.getElementById('eveningHR').value,
        eBO: document.getElementById('eveningBO').value,

        weight: document.getElementById('manualWeight').value,
        poop: document.getElementById('manualPoop').checked,
        symptom: document.getElementById('manualSymptom').value
    };

    healthData.unshift(item);

    saveLocal();

    renderTable();

}

function updateField(index, field, value){

    healthData[index][field] = value;

    saveLocal();

    renderTable();
}

function deleteRow(index){

    if(confirm("確定刪除？")){

        healthData.splice(index,1);

        saveLocal();

        renderTable();
    }
}

function renderMonthOptions(){

    const select = document.getElementById('monthFilter');

    let months = [...new Set(
        healthData.map(d=>d.date.substring(0,7))
    )];

    months.sort().reverse();

    select.innerHTML = '<option value="全部">全部</option>';

    months.forEach(m=>{

        select.innerHTML += `
            <option value="${m}">
                ${m}
            </option>
        `;
    });
}

function renderTable(){

    renderMonthOptions();

    const tbody = document.getElementById('tableBody');

    const userFilter = document.getElementById('userFilter').value;

    const monthFilter = document.getElementById('monthFilter').value;

    tbody.innerHTML = "";

    healthData.forEach((item,index)=>{

        if(userFilter !== '全部' && item.user !== userFilter){
            return;
        }

        if(monthFilter !== '全部' && !item.date.startsWith(monthFilter)){
            return;
        }

        const mp = calculatePulse(item.mBP);
        const ep = calculatePulse(item.eBP);

        tbody.innerHTML += `

<tr>

<td>
<input type="date"
class="editable"
value="${item.date.replace(/\//g,'-')}"
onchange="updateField(${index},'date',this.value.replace(/-/g,'/'))">
</td>

<td>
<select class="editable"
onchange="updateField(${index},'user',this.value)">

<option value="妃" ${item.user==='妃'?'selected':''}>妃</option>
<option value="爸爸" ${item.user==='爸爸'?'selected':''}>爸爸</option>
<option value="媽媽" ${item.user==='媽媽'?'selected':''}>媽媽</option>
<option value="通" ${item.user==='通'?'selected':''}>通</option>

</select>
</td>

<td class="morning-col">
<input class="editable"
value="${item.mBP || ''}"
onchange="updateField(${index},'mBP',this.value)">
</td>

<td class="morning-col ${mp.warning?'warning':''}">
${mp.value}
</td>

<td class="morning-col">
<input class="editable ${hrWarning(item.mHR)?'warning':''}"
value="${item.mHR || ''}"
onchange="updateField(${index},'mHR',this.value)">
</td>

<td class="morning-col">
<input class="editable"
value="${item.mBO || ''}"
onchange="updateField(${index},'mBO',this.value)">
</td>

<td class="evening-col">
<input class="editable"
value="${item.eBP || ''}"
onchange="updateField(${index},'eBP',this.value)">
</td>

<td class="evening-col ${ep.warning?'warning':''}">
${ep.value}
</td>

<td class="evening-col">
<input class="editable ${hrWarning(item.eHR)?'warning':''}"
value="${item.eHR || ''}"
onchange="updateField(${index},'eHR',this.value)">
</td>

<td class="evening-col">
<input class="editable"
value="${item.eBO || ''}"
onchange="updateField(${index},'eBO',this.value)">
</td>

<td>
<input class="editable"
value="${item.weight || ''}"
onchange="updateField(${index},'weight',this.value)">
</td>

<td>
<input type="checkbox"
class="poop-checkbox"
${item.poop ? 'checked' : ''}
onchange="updateField(${index},'poop',this.checked)">
</td>

<td>
<input class="editable"
value="${item.symptom || ''}"
onchange="updateField(${index},'symptom',this.value)">
</td>

<td>
<button class="delete-btn"
onclick="deleteRow(${index})">
🗑
</button>
</td>

</tr>
`;
    });
}

function syncWithGoogleSheet(){

    fetch(GOOGLE_WEB_APP_URL,{
        method:'POST',
        headers:{
            'Content-Type':'application/json'
        },
        body:JSON.stringify(healthData)
    })
    .then(r=>r.text())
    .then(()=>{

        alert("同步成功");

    })
    .catch(err=>{

        console.error(err);

        alert("同步失敗");
    });
}

renderTable();

</script>

</body>
</html>
